# The Mechanist server release-obfuscation policy.
#
# Stability is the priority for the limited alpha. This pass obfuscates project
# implementation names without shrinking or optimizing the shaded runtime.
# Relative report paths resolve from the repository root and are never packaged.

-basedirectory ../../
-dontshrink
-dontoptimize
-useuniqueclassmembernames

-keepattributes Exceptions,InnerClasses,EnclosingMethod,Signature,*Annotation*,Record,PermittedSubclasses,MethodParameters
-renamesourcefileattribute SourceFile

-printmapping target/proguard/server/mapping.txt
-printseeds target/proguard/server/seeds.txt

# Every packaged executable and smoke entry is invoked by its exact class name.
-keepclasseswithmembers class * {
    public static void main(java.lang.String[]);
}

# Explicit packaged entry points. The shaded server JAR contains the shared
# project runtime, so all public executable surfaces retain stable names.
-keep class mechanist.MechanistServerMain {
    public static void main(java.lang.String[]);
}
-keep class mechanist.TheMechanist {
    public static void main(java.lang.String[]);
}
-keep class mechanist.RemoteClientMain {
    public static void main(java.lang.String[]);
}

# Preserve enum and serializable contracts used by network, ledger, save, and
# administrative data.
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}
-keepnames class * implements java.io.Serializable
-keepclassmembers class * implements java.io.Serializable {
    private static final long serialVersionUID;
}

# The host may select Netty or load optional native adapters reflectively.
-keep class io.netty.** { *; }
-keep interface io.netty.** { *; }
-keep class org.lwjgl.** { *; }
-keep interface org.lwjgl.** { *; }
-keep class com.studiohartman.jamepad.** { *; }
-keep interface com.studiohartman.jamepad.** { *; }

# Optional platform adapters may be absent from an individual target package.
-dontwarn com.studiohartman.jamepad.**
-dontwarn org.lwjgl.**
-dontwarn io.netty.**
-dontnote
