name: Build runtime artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'ROOT_build/build_runtime_artifacts.ps1'
      - 'ROOT_tools/jar_artifact_auditor.py'
      - '.github/workflows/build-runtime-artifacts.yml'

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  build-runtime-artifacts:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build distinct client and server jars
        shell: pwsh
        run: |
          ./ROOT_build/build_runtime_artifacts.ps1

      - name: Verify server jar exists and jars differ
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath 'PACKAGE_server/TheMechanistServer.jar' -PathType Leaf)) {
            throw 'PACKAGE_server/TheMechanistServer.jar was not produced.'
          }
          if (-not (Test-Path -LiteralPath 'PACKAGE_client/TheMechanist.jar' -PathType Leaf)) {
            throw 'PACKAGE_client/TheMechanist.jar was not produced.'
          }
          $client = Get-Item -LiteralPath 'PACKAGE_client/TheMechanist.jar'
          $server = Get-Item -LiteralPath 'PACKAGE_server/TheMechanistServer.jar'
          if ($client.Length -eq $server.Length) {
            throw "Client and server jar sizes are identical: $($client.Length)"
          }
          $clientHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $client.FullName).Hash
          $serverHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $server.FullName).Hash
          if ($clientHash -eq $serverHash) {
            throw "Client and server jar hashes are identical: $clientHash"
          }
          Write-Host "Client jar size: $($client.Length) SHA256=$clientHash"
          Write-Host "Server jar size: $($server.Length) SHA256=$serverHash"

      - name: Upload runtime artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: mechanist-runtime-artifacts
          path: |
            PACKAGE_client/TheMechanist.jar
            PACKAGE_server/TheMechanistServer.jar
            docs/jar_artifact_audit.json
            docs/jar_artifact_audit.tsv
          if-no-files-found: error

      - name: Commit generated jars and audit reports
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add PACKAGE_client/TheMechanist.jar PACKAGE_server/TheMechanistServer.jar docs/jar_artifact_audit.json docs/jar_artifact_audit.tsv
          $status = git status --short
          if ([string]::IsNullOrWhiteSpace($status)) {
            Write-Host 'No generated jar changes to commit.'
          } else {
            git commit -m 'Build: publish runtime jars [skip ci]'
            git push
          }
