name: Dispatch Live Semantic Migration V2

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-live-semantic-migration.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch robust semantic migration workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-live-semantic-render-migration-v2.yml/dispatches \
            -d '{"ref":"main"}'
