name: Monitor Compile Repair and Migration

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-live-semantic-migration.yml'

permissions:
  actions: read
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for patch and migration workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          check_run() {
            workflow="$1"
            for attempt in $(seq 1 60); do
              json=$(curl -sS \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${workflow}/runs?event=workflow_dispatch&per_page=1")
              id=$(echo "$json" | jq -r '.workflow_runs[0].id // empty')
              status=$(echo "$json" | jq -r '.workflow_runs[0].status // empty')
              conclusion=$(echo "$json" | jq -r '.workflow_runs[0].conclusion // empty')
              echo "$workflow run=$id status=$status conclusion=$conclusion"
              if [ "$status" = "completed" ]; then
                test "$conclusion" = "success"
                return
              fi
              sleep 10
            done
            return 1
          }
          check_run patch-semantic-migration-v2-compile.yml
          check_run one-shot-live-semantic-render-migration-v2.yml
