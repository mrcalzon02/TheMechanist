name: Dispatch Compile Workflow Again

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-live-semantic-migration.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/patch-semantic-migration-v2-compile.yml/dispatches \
            -d '{"ref":"main"}'
