name: Inspect Live Semantic Migration

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-live-semantic-migration.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print latest semantic migration failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-live-semantic-render-migration.yml/runs?event=workflow_dispatch&per_page=1"
          json=$(curl --fail-with-body -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api")
          run_id=$(echo "$json" | jq -r '.workflow_runs[0].id')
          status=$(echo "$json" | jq -r '.workflow_runs[0].status')
          conclusion=$(echo "$json" | jq -r '.workflow_runs[0].conclusion')
          echo "run_id=$run_id status=$status conclusion=$conclusion"
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${run_id}/logs" \
            -o run-logs.zip
          mkdir logs
          unzip -q run-logs.zip -d logs
          echo '--- error context ---'
          grep -RniE "error|traceback|expected .* not found|failed|SystemExit" logs | tail -80 || true
          echo '--- final log lines ---'
          find logs -type f -print0 | xargs -0 tail -n 35
