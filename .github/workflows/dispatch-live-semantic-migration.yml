name: Monitor Live Semantic Migration

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-live-semantic-migration.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for latest semantic migration workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-live-semantic-render-migration.yml/runs?event=workflow_dispatch&per_page=1"
          for attempt in $(seq 1 60); do
            json=$(curl --fail-with-body -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api")
            run_id=$(echo "$json" | jq -r '.workflow_runs[0].id // empty')
            status=$(echo "$json" | jq -r '.workflow_runs[0].status // empty')
            conclusion=$(echo "$json" | jq -r '.workflow_runs[0].conclusion // empty')
            echo "attempt=$attempt run_id=$run_id status=$status conclusion=$conclusion"
            if [ -n "$run_id" ] && [ "$status" = "completed" ]; then
              [ "$conclusion" = "success" ]
              exit $?
            fi
            sleep 10
          done
          echo "Timed out waiting for semantic migration workflow" >&2
          exit 1
