name: Inspect Semantic Migration V2

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-live-semantic-migration.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print latest semantic migration v2 errors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          json=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-live-semantic-render-migration-v2.yml/runs?event=workflow_dispatch&per_page=1")
          id=$(echo "$json" | jq -r '.workflow_runs[0].id')
          echo "run=$id"
          curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${id}/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          grep -RniE "error:|cannot find symbol|incompatible types|Exception|AssertionError|failed" logs | tail -120 || true
          find logs -type f -print0 | xargs -0 tail -n 45
