name: Inspect Live Asset Paths Compact

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-live-asset-paths-compact.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print compact live path findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27512307040/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          pathlog=$(find logs -type f -iname '*Audit live semantic call paths*.txt' | head -1)
          python - "$pathlog" <<'PY'
          import re, sys
          sections = {
              '=== LIVE RESOLVER CALLS ===': [],
              '=== COMPILED DESCRIPTOR LOCATION AND ASSET IDS ===': [],
              '=== LEGACY RENDER LOOKUPS ===': [],
              '=== TILE ART IMAGE METHOD ===': [],
              '=== TILE SEMANTIC FALLBACK METHOD ===': [],
          }
          active = None
          with open(sys.argv[1], encoding='utf-8-sig', errors='replace') as handle:
              for raw in handle:
                  line = re.sub(r'^.*?Z ', '', raw.rstrip())
                  if line.startswith('=== '):
                      active = line if line in sections else None
                      continue
                  if active and line and not line.startswith('2026-'):
                      sections[active].append(line)
          for heading, values in sections.items():
              print(heading)
              for line in values[:80]:
                  print(line)
              print('COUNT=' + str(len(values)))
          PY
