name: Inspect Character Paper Doll Restoration V2

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-character-paper-doll-restore-v2.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print latest restoration errors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          json=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-character-paper-doll-restore-v2.yml/runs?event=workflow_dispatch&per_page=1")
          id=$(echo "$json" | jq -r '.workflow_runs[0].id')
          echo "run=$id"
          curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${id}/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          grep -RniE "AssertionError|Exception|error:|FAILED|failed|PASS" logs | tail -160 || true
          find logs -type f -print0 | xargs -0 tail -n 60
