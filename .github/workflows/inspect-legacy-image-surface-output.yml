name: Inspect Legacy Image Surface Output

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-legacy-image-surface-output.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print prior image surface findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27512874051/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          output=$(find logs -type f -iname '*Print image surface methods*.txt' | head -1)
          grep -E 'Z (FILE=|[0-9]+[-:]|--)' "$output" | sed -E 's/^.*Z //'
