name: One Shot Milestone 05 Room Shell Material Ledger

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-milestone05-room-shell-material-ledger.yml'

permissions:
  contents: write
  statuses: write

jobs:
  implement-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply exact room shell material ledger
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('src/mechanist/FactionRoomShellConstructionAuthority.java')
          text = source.read_text(encoding='utf-8')
          pattern = re.compile(
              r'(        BuildRecipe recipe = new BuildRecipe\(MARKER_RECIPE, COMPLETED_MARKER_SYMBOL,\n)'
              r'                MATERIAL_STOCK_COST, 0, 0, 0, 0, LABOR_REQUIRED, 0,\n'
              r'                false, site\.faction, null,\n'
          )
          replacement = (
              r'\1'
              '                20, 0, 0, 0, 0, LABOR_REQUIRED, 0,\n'
              '                false, site.faction, Map.of(\n'
              '                        "Scrap plate", 14,\n'
              '                        "Rivet set", 14,\n'
              '                        "Bearing set", 1),\n'
          )
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected exactly one room-shell recipe marker, replaced {count}')
          source.write_text(updated, encoding='utf-8', newline='')
          PY
          git diff --check
          git diff -- src/mechanist/FactionRoomShellConstructionAuthority.java

      - name: Compile full Java source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/room-shell-material-ledger
          mkdir -p ROOT_build/room-shell-material-ledger/classes
          find src -name '*.java' -print | sort > ROOT_build/room-shell-material-ledger/sources.txt
          javac -encoding UTF-8 --release 17 \
            -d ROOT_build/room-shell-material-ledger/classes \
            @ROOT_build/room-shell-material-ledger/sources.txt

      - name: Run focused room shell construction smoke
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/room-shell-material-ledger/classes \
            mechanist.Milestone05FactionRoomShellConstructionSmoke

      - name: Run adjacent physical construction smokes
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/room-shell-material-ledger/classes \
            mechanist.Milestone05FactionPhysicalConstructionSmoke
          java -Djava.awt.headless=true \
            -cp ROOT_build/room-shell-material-ledger/classes \
            mechanist.Milestone05FactionBlueprintSiteUpgradeSmoke

      - name: Run Gate 3 player-facing smoke suite
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/room-shell-material-ledger/classes \
            mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Commit verified room shell material ledger to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/FactionRoomShellConstructionAuthority.java
          if git diff --cached --quiet; then
            echo 'Room shell material ledger already correct; no commit needed.'
            exit 0
          fi
          git commit -m 'Fix faction room shell material ledger'
          git push origin HEAD:main

  publish-status:
    if: always()
    needs: implement-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Publish room shell material workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.implement-and-verify.result }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: result === 'success' ? 'success' : 'failure',
              context: 'one-shot-room-shell-material-ledger',
              description: result === 'success'
                ? 'Room shell ledger compiled, smoked, and committed'
                : `Room shell material workflow ${result}`
            });
