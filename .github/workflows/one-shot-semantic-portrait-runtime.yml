name: One Shot Semantic Portrait Runtime

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-semantic-portrait-runtime.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install portrait authority and migration bridge
        shell: bash
        env:
          AUTHORITY_GZ_B64: ""
          SMOKE_GZ_B64: ""
          PATCH_GZ_B64: ""
        run: |
          set -euo pipefail
          echo "$AUTHORITY_GZ_B64" | base64 -d | gzip -d > src/mechanist/PortraitSemanticAssetAuthority.java
          echo "$SMOKE_GZ_B64" | base64 -d | gzip -d > src/mechanist/PortraitSemanticRuntimeRegistrySmoke.java
          echo "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/portrait_migrate.py
          python /tmp/portrait_migrate.py

      - name: Compile and generate partition index
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/semantic-portrait-runtime
          mkdir -p ROOT_build/semantic-portrait-runtime/classes
          find src -name '*.java' -print > ROOT_build/semantic-portrait-runtime/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/semantic-portrait-runtime/classes @ROOT_build/semantic-portrait-runtime/sources.txt
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -Dmechanist.writePortraitPartitionIndex=true -cp ROOT_build/semantic-portrait-runtime/classes mechanist.PortraitSemanticRuntimeRegistrySmoke

      - name: Regenerate maps and repository manifest
        shell: bash
        run: |
          set -euo pipefail
          map_script="$(find . -type f -name 'BUILD_MERMAID_CODE_MAP.py' | head -1 || true)"
          if [[ -z "$map_script" ]]; then map_script="$(grep -RIl --include='*.py' 'CODE_MERMAID_POSITION_LEDGER' ROOT_docs ROOT_tools 2>/dev/null | head -1 || true)"; fi
          test -n "$map_script"
          python "$map_script"
          grep -Rqs 'src/mechanist/PortraitSemanticAssetAuthority.java' ROOT_docs/functionmap
          grep -Rqs 'src/mechanist/PortraitSemanticRuntimeRegistrySmoke.java' ROOT_docs/functionmap
          pwsh -File ROOT_tools/update-repository-file-manifest.ps1

      - name: Run semantic and Gate 3 verification
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/semantic-portrait-runtime/classes
          mkdir -p ROOT_build/semantic-portrait-runtime/classes
          find src -name '*.java' -print > ROOT_build/semantic-portrait-runtime/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/semantic-portrait-runtime/classes @ROOT_build/semantic-portrait-runtime/sources.txt
          CP=ROOT_build/semantic-portrait-runtime/classes
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp "$CP" mechanist.PortraitSemanticRuntimeRegistrySmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp "$CP" mechanist.TileSemanticRuntimeRegistrySmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp "$CP" mechanist.RuntimeSemanticAssetHintSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp "$CP" mechanist.ObjectSemanticRuntimeCoverageSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp "$CP" mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp "$CP" mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-semantic-portrait-runtime.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/PortraitSemanticAssetAuthority.java src/mechanist/PortraitSemanticRuntimeRegistrySmoke.java src/mechanist/LegacyPanelContext.java src/mechanist/MediaRuntimeFramework.java PACKAGE_client/assets/indexes/semantic_portrait_entity_partitions.tsv PACKAGE_client/assets/indexes/semantic_asset_deferred_legacy.tsv ROOT_docs/DEVELOPMENT_HISTORY.md ROOT_docs/functionmap ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv .github/workflows/one-shot-semantic-portrait-runtime.yml
          git commit -m 'Route portraits through semantic registry partitions'
          git push origin HEAD:main
