name: Patch Semantic Migration V2 Compile

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  patch-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace Windows command-line source expansion with javac argfile
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/one-shot-live-semantic-render-migration-v2.yml')
          lines = path.read_text(encoding='utf-8').splitlines()
          changed = False
          output = []
          index = 0
          while index < len(lines):
              line = lines[index]
              if '$sources = Get-ChildItem -Recurse src -Filter *.java' in line:
                  indent = line[:len(line) - len(line.lstrip())]
                  output.append(indent + 'Get-ChildItem -Recurse src -Filter *.java | ForEach-Object { $_.FullName } | Set-Content -Encoding UTF8 semantic-migration-sources.txt')
                  if index + 1 >= len(lines) or 'javac -encoding UTF-8 --release 17' not in lines[index + 1]:
                      raise SystemExit('Expected javac line after source collection')
                  output.append(indent + 'javac -encoding UTF-8 --release 17 -d ROOT_build/semantic-migration-v2-classes "@semantic-migration-sources.txt"')
                  index += 2
                  changed = True
                  continue
              output.append(line)
              index += 1
          if not changed:
              raise SystemExit('Source collection line was not found')
          path.write_text('\n'.join(output) + '\n', encoding='utf-8', newline='')
          PY

      - name: Commit workflow repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/one-shot-live-semantic-render-migration-v2.yml
          git commit -m 'Repair semantic migration Java source argfile'
          git push

      - name: Dispatch repaired semantic migration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-live-semantic-render-migration-v2.yml/dispatches \
            -d '{"ref":"main"}'
