name: Patch Semantic Migration V2 Compile

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  patch-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace Windows command-line source expansion with javac argfile
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/one-shot-live-semantic-render-migration-v2.yml')
          text = path.read_text(encoding='utf-8')
          old = '''          $sources = Get-ChildItem -Recurse src -Filter *.java | ForEach-Object { $_.FullName }
          javac -encoding UTF-8 --release 17 -d ROOT_build/semantic-migration-v2-classes $sources'''
          new = '''          Get-ChildItem -Recurse src -Filter *.java | ForEach-Object { $_.FullName } | Set-Content -Encoding UTF8 semantic-migration-sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/semantic-migration-v2-classes "@semantic-migration-sources.txt"'''
          if old not in text:
              raise SystemExit('Expected javac source expansion block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='')
          PY

      - name: Commit workflow repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/one-shot-live-semantic-render-migration-v2.yml
          git commit -m 'Repair semantic migration Java source argfile'
          git push

      - name: Dispatch repaired semantic migration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-live-semantic-render-migration-v2.yml/dispatches \
            -d '{"ref":"main"}'
