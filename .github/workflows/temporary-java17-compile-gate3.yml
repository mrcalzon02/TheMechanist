name: Temporary Java 17 Compile and Gate 3

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/temporary-java17-compile-gate3.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile and run Gate 3
        id: gate
        shell: bash
        run: |
          set +e
          mkdir -p ROOT_build/temporary-java17
          log='ROOT_build/temporary-java17/result.log'
          : > "$log"
          result='success'
          stage='none'
          code=0

          echo '=== Compile full Java source tree ===' | tee -a "$log"
          find src -name '*.java' -print | sort > ROOT_build/temporary-java17/sources.txt
          mkdir -p ROOT_build/temporary-java17/classes
          javac -encoding UTF-8 --release 17 \
            -d ROOT_build/temporary-java17/classes \
            @ROOT_build/temporary-java17/sources.txt >>"$log" 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            result='failure'
            stage='Compile full Java source tree'
          else
            echo 'PASSED compile' | tee -a "$log"
            echo '=== Gate 3 player-facing smoke suite ===' | tee -a "$log"
            java -Djava.awt.headless=true \
              -cp ROOT_build/temporary-java17/classes \
              mechanist.Gate3PlayerFacingTextSmokeSuite >>"$log" 2>&1
            code=$?
            if [ "$code" -ne 0 ]; then
              result='failure'
              stage='Gate 3 player-facing smoke suite'
            else
              echo 'PASSED Gate 3' | tee -a "$log"
            fi
          fi

          tail -n 220 "$log" > ROOT_build/temporary-java17/tail.log
          echo "result=$result" >> "$GITHUB_OUTPUT"
          echo "stage=$stage" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish verification result
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.gate.outputs.result }}
          STAGE: ${{ steps.gate.outputs.stage }}
          CODE: ${{ steps.gate.outputs.code }}
        with:
          script: |
            const fs = require('fs');
            const passed = process.env.RESULT === 'success';
            const stage = process.env.STAGE || 'unknown';
            const code = process.env.CODE || 'unknown';
            const log = fs.readFileSync('ROOT_build/temporary-java17/tail.log', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 46,
              body: [
                '## Minimal Java 17 compile and Gate 3 verification',
                '',
                `Commit: \`${context.sha}\``,
                `Result: **${passed ? 'PASS' : 'FAIL'}**`,
                `First failing stage: **${stage}**`,
                `Exit code: \`${code}\``,
                '',
                '```text',
                log,
                '```'
              ].join('\n')
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'temporary-java17-compile-gate3',
              description: passed ? 'Java 17 compile and Gate 3 passed' : `Failed: ${stage}`
            });
