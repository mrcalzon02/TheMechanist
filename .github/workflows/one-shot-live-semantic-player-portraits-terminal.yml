name: One Shot Terminal Live Semantic Player Portraits

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-shot-live-semantic-player-portraits
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Patch, compile, and verify
        id: verify
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            git pull --ff-only origin main
            python - <<'PY'
          from pathlib import Path
          path = Path('src/mechanist/LegacyPanelContext.java')
          text = path.read_text(encoding='utf-8')
          old_active = 'images.getPlayerPortrait(active)'
          old_overview = 'images.getPlayerPortrait(c)'
          new_active = 'PortraitSemanticRuntimeBridge.playerPortrait(images, active)'
          new_overview = 'PortraitSemanticRuntimeBridge.playerPortrait(images, c)'
          inventory = (text.count('images.getPlayerPortrait('), text.count(old_active), text.count(old_overview), text.count(new_active), text.count(new_overview))
          print('portrait-call-inventory', inventory)
          if inventory[:3] == (3, 2, 1):
              text = text.replace(old_active, new_active).replace(old_overview, new_overview)
          elif inventory != (0, 0, 0, 2, 1):
              raise SystemExit('Unexpected live portrait call inventory.')
          if text.count(new_active) != 2 or text.count(new_overview) != 1:
              raise SystemExit('Semantic bridge call inventory is incorrect.')
          path.write_text(text, encoding='utf-8')
          PY
            rm -rf ROOT_build/live-semantic-player-portraits
            mkdir -p ROOT_build/live-semantic-player-portraits/classes
            find src -name '*.java' -print > ROOT_build/live-semantic-player-portraits/sources.txt
            javac -encoding UTF-8 --release 17 -d ROOT_build/live-semantic-player-portraits/classes @ROOT_build/live-semantic-player-portraits/sources.txt
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.PortraitSemanticRuntimeSmoke
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Milestone02SemanticCompiledIndexBoundarySmoke
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Gate3PlayerFacingTextSmokeSuite
          } > /tmp/live-portrait-terminal.log 2>&1
          status=$?
          cat /tmp/live-portrait-terminal.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit verified migration
        if: steps.verify.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo
            echo '## Milestone 02 - Live Semantic Player Portrait Rendering'
            echo
            echo 'The moving player sprite, movement-plan destination preview, and character overview now resolve the persistent portrait index through the active semantic registry before the established portrait-sheet fallback. Full Java 17 compilation, portrait semantic runtime, semantic coverage, compiled-index boundary, and Gate 3 verification passed.'
          } >> ROOT_docs/DEVELOPMENT_HISTORY.md
          rm -rf ROOT_build/live-semantic-player-portraits
          rm -f ROOT_docs/.noop ROOT_docs/LIVE_SEMANTIC_PLAYER_PORTRAIT_MIGRATION_FAILURE.md
          rm -f .github/workflows/one-shot-live-semantic-player-portraits.yml
          rm -f .github/workflows/one-shot-live-semantic-player-portraits-scheduled.yml
          rm -f .github/workflows/one-shot-live-semantic-player-portraits-terminal.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Route live player portraits through semantic identity resolution'
          git push origin HEAD:main

      - name: Commit failure and restore renderer
        if: steps.verify.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- src/mechanist/LegacyPanelContext.java
          {
            echo
            echo '## Milestone 02 - Live Semantic Player Portrait Migration Verification Failure'
            echo
            echo 'The live renderer edit was discarded. Verification log tail:'
            echo '```text'
            tail -n 180 /tmp/live-portrait-terminal.log
            echo '```'
          } >> ROOT_docs/DEVELOPMENT_HISTORY.md
          rm -rf ROOT_build/live-semantic-player-portraits
          rm -f ROOT_docs/.noop
          rm -f .github/workflows/one-shot-live-semantic-player-portraits.yml
          rm -f .github/workflows/one-shot-live-semantic-player-portraits-scheduled.yml
          rm -f .github/workflows/one-shot-live-semantic-player-portraits-terminal.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record live semantic player portrait verification failure'
          git push origin HEAD:main
