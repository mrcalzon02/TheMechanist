name: Issue Command Room Shell Repair

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  statuses: write

concurrency:
  group: issue-command-room-shell-repair
  cancel-in-progress: false

jobs:
  repair-and-verify:
    if: >-
      github.event.issue.title == '[automation] Repair Milestone 05 room shell material ledger' &&
      (github.event_name == 'issues' || github.event.comment.body == '/run-room-shell-repair')
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply exact annex material bill
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('src/mechanist/FactionRoomShellConstructionAuthority.java')
          text = source.read_text(encoding='utf-8')
          pattern = re.compile(
              r'(        BuildRecipe recipe = new BuildRecipe\(MARKER_RECIPE, COMPLETED_MARKER_SYMBOL,\n)'
              r'                MATERIAL_STOCK_COST, 0, 0, 0, 0, LABOR_REQUIRED, 0,\n'
              r'                false, site\.faction, null,\n'
          )
          replacement = (
              r'\1'
              '                20, 0, 0, 0, 0, LABOR_REQUIRED, 0,\n'
              '                false, site.faction, null,\n'
          )
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected exactly one room-shell recipe marker, replaced {count}')

          marker = '''        BaseObject marker = ProgressiveConstructionAuthority.createSite(
                recipe, markerTile.x, markerTile.y, LABOR_REQUIRED);
        marker.constructionInsertedItems = marker.constructionRequiredItems;
'''
          replacement_marker = '''        BaseObject marker = ProgressiveConstructionAuthority.createSite(
                recipe, markerTile.x, markerTile.y, LABOR_REQUIRED);
        marker.constructionRequiredItems = "Bearing set=1;Construction supplies=20;Rivet set=14;Scrap plate=14";
        marker.constructionInsertedItems = marker.constructionRequiredItems;
'''
          if updated.count(marker) != 1:
              raise SystemExit(f'Expected exactly one room-shell site marker, found {updated.count(marker)}')
          updated = updated.replace(marker, replacement_marker, 1)
          source.write_text(updated, encoding='utf-8', newline='')
          PY
          git diff --check
          git diff -- src/mechanist/FactionRoomShellConstructionAuthority.java

      - name: Inspect normal completed-room replay hook
        id: replay-hook
        shell: bash
        run: |
          set -euo pipefail
          matches="$(grep -R --include='*.java' -n 'FactionRoomShellConstructionAuthority.restoreCompletedRooms' src/mechanist \
            | grep -v 'Milestone05FactionRoomShellConstructionSmoke.java' \
            | grep -v 'FactionRoomShellConstructionAuthority.java' || true)"
          if [ -n "$matches" ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
            {
              echo 'details<<EOF'
              echo "$matches"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
            echo 'details=No ordinary runtime caller found.' >> "$GITHUB_OUTPUT"
          fi

      - name: Compile full Java source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/room-shell-repair
          mkdir -p ROOT_build/room-shell-repair/classes
          find src -name '*.java' -print | sort > ROOT_build/room-shell-repair/sources.txt
          javac -encoding UTF-8 --release 17 \
            -d ROOT_build/room-shell-repair/classes \
            @ROOT_build/room-shell-repair/sources.txt

      - name: Run focused room shell smoke
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true -cp ROOT_build/room-shell-repair/classes \
            mechanist.Milestone05FactionRoomShellConstructionSmoke

      - name: Run adjacent Milestone 05 smokes
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true -cp ROOT_build/room-shell-repair/classes \
            mechanist.Milestone05FactionPhysicalConstructionSmoke
          java -Djava.awt.headless=true -cp ROOT_build/room-shell-repair/classes \
            mechanist.Milestone05FactionBlueprintSiteUpgradeSmoke

      - name: Run expanded Gate 3 suite
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true -cp ROOT_build/room-shell-repair/classes \
            mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Commit verified repair and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/issue-command-room-shell-repair.yml
          git add src/mechanist/FactionRoomShellConstructionAuthority.java
          git diff --cached --check
          git commit -m 'Fix faction room shell material ledger'
          git push origin HEAD:main

      - name: Report success on audit issue
        uses: actions/github-script@v7
        with:
          script: |
            const hook = '${{ steps.replay-hook.outputs.present }}' === 'true';
            const details = `${{ steps.replay-hook.outputs.details }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                'Verified repair committed to `main`.',
                '',
                '- Java 17 full-source compilation passed.',
                '- Milestone 05 room-shell, physical-construction, and blueprint-site smokes passed.',
                '- Expanded Gate 3 passed.',
                `- Ordinary completed-room replay hook: **${hook ? 'present' : 'not found'}**.`,
                hook ? `\`${details}\`` : 'A narrow load-path integration follow-up remains required.'
              ].join('\n')
            });

  report-failure:
    if: >-
      always() &&
      github.event.issue.title == '[automation] Repair Milestone 05 room shell material ledger' &&
      (github.event_name == 'issues' || github.event.comment.body == '/run-room-shell-repair')
    needs: repair-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Report workflow result
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.repair-and-verify.result }}';
            if (result === 'success') return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Room-shell repair gate finished with **${result}**. No verified source commit should be treated as complete; inspect the Actions log before continuing.`
            });
