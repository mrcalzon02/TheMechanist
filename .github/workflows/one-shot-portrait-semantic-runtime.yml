name: One Shot Portrait Semantic Runtime

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-portrait-semantic-runtime.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Add active-registry portrait selection
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python - <<'PY'
          from pathlib import Path

          authority = Path('src/mechanist/PortraitSemanticAssetAuthority.java')
          text = authority.read_text(encoding='utf-8')
          text = text.replace('public static final String VERSION = "0.9.10ka-stage8-portrait-entity-partitions";',
                              'public static final String VERSION = "0.9.10kd-runtime-portrait-partitions";')

          marker = '''    public static List<String> infopediaLines(Path projectRoot, String assetId) {
          '''
          if marker not in text:
              raise SystemExit('Portrait authority insertion marker missing')

          methods = '''    public static Optional<String> runtimePlayerAssetId(Path projectRoot,
                                                         AssetRegistry registry,
                                                         String portraitSheet,
                                                         int portraitIndex) {
        List<PartitionRecord> records = activeRecords(projectRoot, registry).stream()
                .filter(PartitionRecord::playerCreationAllowed)
                .filter(record -> !record.nameLockedOnly())
                .filter(record -> !record.nonhumanOrRestricted())
                .toList();
        List<PartitionRecord> partitionMatched = partitionMatches(records, portraitSheet);
        List<PartitionRecord> pool = partitionMatched.isEmpty() ? records : partitionMatched;
        return deterministicAsset(pool, Objects.hash(normalizeSearchText(portraitSheet), portraitIndex));
    }

    public static Optional<String> runtimeNpcAssetId(Path projectRoot,
                                                      AssetRegistry registry,
                                                      String identityKey,
                                                      int identitySeed) {
        List<PartitionRecord> active = activeRecords(projectRoot, registry);
        Optional<String> nameLocked = deterministicAsset(
                bestIdentityMatches(active.stream().filter(PartitionRecord::nameLockedOnly).toList(), identityKey),
                Objects.hash(normalizeSearchText(identityKey), identitySeed));
        if (nameLocked.isPresent()) return nameLocked;

        List<PartitionRecord> records = active.stream()
                .filter(PartitionRecord::npcPoolAllowed)
                .filter(record -> !record.nameLockedOnly())
                .filter(record -> !record.nonhumanOrRestricted())
                .toList();
        List<PartitionRecord> partitionMatched = partitionMatches(records, identityKey);
        List<PartitionRecord> pool = partitionMatched.isEmpty() ? records : partitionMatched;
        return deterministicAsset(pool, Objects.hash(normalizeSearchText(identityKey), identitySeed));
    }

    public static List<PartitionRecord> activePlayerPool(Path projectRoot, AssetRegistry registry) {
        return activeRecords(projectRoot, registry).stream()
                .filter(PartitionRecord::playerCreationAllowed)
                .filter(record -> !record.nameLockedOnly())
                .filter(record -> !record.nonhumanOrRestricted())
                .toList();
    }

    public static List<PartitionRecord> activeNpcPool(Path projectRoot, AssetRegistry registry) {
        return activeRecords(projectRoot, registry).stream()
                .filter(PartitionRecord::npcPoolAllowed)
                .filter(record -> !record.nameLockedOnly())
                .filter(record -> !record.nonhumanOrRestricted())
                .toList();
    }

    private static List<PartitionRecord> activeRecords(Path projectRoot, AssetRegistry registry) {
        try {
            AssetRegistry safeRegistry = registry == null
                    ? AssetRegistry.loadDefault(projectRoot == null ? Path.of(".") : projectRoot)
                    : registry;
            return loadDefault(projectRoot).stream()
                    .filter(record -> safeRegistry.find(record.assetId())
                            .filter(metadata -> metadata.type() == AssetType.PORTRAIT)
                            .isPresent())
                    .toList();
        } catch (IOException | RuntimeException ex) {
            return List.of();
        }
    }

    private static List<PartitionRecord> partitionMatches(List<PartitionRecord> records, String hint) {
        String normalizedHint = normalizeSearchText(hint);
        if (normalizedHint.isBlank() || records == null || records.isEmpty()) return List.of();
        List<String> tokens = searchTokens(normalizedHint);
        if (tokens.isEmpty()) return List.of();
        return records.stream()
                .filter(record -> {
                    String haystack = normalizeSearchText(record.partitionKey() + " "
                            + record.partitionLabel() + " " + record.registryPath() + " " + record.notes());
                    for (String token : tokens) if (haystack.contains(token)) return true;
                    return false;
                })
                .toList();
    }

    private static List<PartitionRecord> bestIdentityMatches(List<PartitionRecord> records, String identityKey) {
        String normalizedIdentity = normalizeSearchText(identityKey);
        if (normalizedIdentity.isBlank() || records == null || records.isEmpty()) return List.of();
        List<String> tokens = searchTokens(normalizedIdentity);
        if (tokens.isEmpty()) return List.of();
        int best = 0;
        ArrayList<PartitionRecord> matches = new ArrayList<>();
        for (PartitionRecord record : records) {
            String haystack = normalizeSearchText(record.partitionKey() + " "
                    + record.partitionLabel() + " " + record.registryPath() + " " + record.notes());
            int score = 0;
            for (String token : tokens) if (haystack.contains(token)) score += token.length();
            if (score <= 0) continue;
            if (score > best) {
                best = score;
                matches.clear();
            }
            if (score == best) matches.add(record);
        }
        return List.copyOf(matches);
    }

    private static Optional<String> deterministicAsset(List<PartitionRecord> records, int seed) {
        if (records == null || records.isEmpty()) return Optional.empty();
        List<PartitionRecord> ordered = records.stream()
                .sorted(Comparator.comparing(PartitionRecord::partitionKey)
                        .thenComparing(PartitionRecord::assetId))
                .toList();
        int index = Math.floorMod(seed, ordered.size());
        return Optional.of(ordered.get(index).assetId());
    }

    private static List<String> searchTokens(String value) {
        ArrayList<String> tokens = new ArrayList<>();
        for (String token : normalizeSearchText(value).split(" ")) {
            if (token.length() < 4) continue;
            if (token.equals("portrait") || token.equals("sheet") || token.equals("pool")
                    || token.equals("entity") || token.equals("class")) continue;
            tokens.add(token);
        }
        return List.copyOf(tokens);
    }

    private static String normalizeSearchText(String value) {
        if (value == null) return "";
        return value.toLowerCase(Locale.ROOT)
                .replace('_', ' ')
                .replace('-', ' ')
                .replaceAll("[^a-z0-9 ]+", " ")
                .replaceAll("\\s+", " ")
                .trim();
    }

'''
          if 'runtimePlayerAssetId' not in text:
              text = text.replace(marker, methods + marker, 1)
          authority.write_text(text, encoding='utf-8')

          legacy = Path('src/mechanist/LegacyPanelContext.java')
          text = legacy.read_text(encoding='utf-8')

          old = '''    BufferedImage getNpcPortraitFor(Object npc) {
        ensureLoaded(lastOptions);
        if (npc instanceof NpcEntity entity) return media.getNpcPortraitFor(entity);
        return media.getNpcPortrait(npc == null ? 0 : Math.abs(npc.hashCode()));
    }

    BufferedImage getPlayerPortrait(Candidate candidate) {
        ensureLoaded(lastOptions);
        if (candidate == null) return media.getPortrait(ImageCache.PLAYER_BASELINE_HUMAN_POOL, 0);
        return media.getPortrait(candidate.portraitSheet, candidate.portraitIndex);
    }
'''
          new = '''    BufferedImage getNpcPortraitFor(Object npc) {
        ensureLoaded(lastOptions);
        String identity = npc == null ? "" : String.valueOf(npc);
        int seed = npc == null ? 0 : npc.hashCode();
        Optional<String> semanticId = PortraitSemanticAssetAuthority.runtimeNpcAssetId(
                java.nio.file.Path.of("."), mechanist.assets.AssetManager.registry(), identity, seed);
        if (semanticId.isPresent()) {
            BufferedImage semantic = media.getSemanticAssetImage(semanticId.get());
            if (semantic != null) return semantic;
        }
        if (npc instanceof NpcEntity entity) return media.getNpcPortraitFor(entity);
        return media.getNpcPortrait(Math.abs(seed));
    }

    BufferedImage getPlayerPortrait(Candidate candidate) {
        ensureLoaded(lastOptions);
        if (candidate == null) return media.getPortrait(ImageCache.PLAYER_BASELINE_HUMAN_POOL, 0);
        Optional<String> semanticId = PortraitSemanticAssetAuthority.runtimePlayerAssetId(
                java.nio.file.Path.of("."), mechanist.assets.AssetManager.registry(),
                candidate.portraitSheet, candidate.portraitIndex);
        if (semanticId.isPresent()) {
            BufferedImage semantic = media.getSemanticAssetImage(semanticId.get());
            if (semantic != null) return semantic;
        }
        return media.getPortrait(candidate.portraitSheet, candidate.portraitIndex);
    }
'''
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one live portrait block, found {text.count(old)}')
          legacy.write_text(text.replace(old, new), encoding='utf-8')

          smoke = Path('src/mechanist/PortraitSemanticRuntimeSmoke.java')
          smoke.write_text('''package mechanist;

import mechanist.assets.AssetManager;
import mechanist.assets.AssetMetadata;
import mechanist.assets.AssetType;

import java.nio.file.Path;

public final class PortraitSemanticRuntimeSmoke {
    public static void main(String[] args) throws Exception {
        Path root = Path.of(".").toAbsolutePath().normalize();
        var registry = AssetManager.registry();
        if (registry.size() == 0) throw new AssertionError("active asset registry was empty");

        var audit = PortraitSemanticAssetAuthority.audit(root, registry);
        if (!audit.passed()) throw new AssertionError("portrait partition audit failed: " + audit.errors());

        var players = PortraitSemanticAssetAuthority.activePlayerPool(root, registry);
        var npcs = PortraitSemanticAssetAuthority.activeNpcPool(root, registry);
        if (players.isEmpty()) throw new AssertionError("active player portrait pool was empty");
        if (npcs.isEmpty()) throw new AssertionError("active NPC portrait pool was empty");
        if (players.stream().anyMatch(record -> record.nameLockedOnly() || record.nonhumanOrRestricted())) {
            throw new AssertionError("restricted portrait leaked into player pool");
        }
        if (npcs.stream().anyMatch(record -> record.nameLockedOnly() || record.nonhumanOrRestricted())) {
            throw new AssertionError("restricted portrait leaked into ordinary NPC pool");
        }

        String playerA = PortraitSemanticAssetAuthority.runtimePlayerAssetId(
                root, registry, "administratum baseline human", 7).orElseThrow();
        String playerB = PortraitSemanticAssetAuthority.runtimePlayerAssetId(
                root, registry, "administratum baseline human", 7).orElseThrow();
        if (!playerA.equals(playerB)) throw new AssertionError("player portrait selection was not deterministic");

        String npcA = PortraitSemanticAssetAuthority.runtimeNpcAssetId(
                root, registry, "ordinary hiver worker", 4421).orElseThrow();
        String npcB = PortraitSemanticAssetAuthority.runtimeNpcAssetId(
                root, registry, "ordinary hiver worker", 4421).orElseThrow();
        if (!npcA.equals(npcB)) throw new AssertionError("NPC portrait selection was not deterministic");

        for (String id : java.util.List.of(playerA, npcA)) {
            AssetMetadata metadata = registry.find(id).orElseThrow();
            if (metadata.type() != AssetType.PORTRAIT) {
                throw new AssertionError("runtime portrait selection returned non-portrait asset " + id);
            }
        }

        System.out.println("PortraitSemanticRuntimeSmoke PASS " + audit.summaryLine()
                + " player=" + playerA + " npc=" + npcA
                + " authority=" + PortraitSemanticAssetAuthority.VERSION);
    }

    private PortraitSemanticRuntimeSmoke() {}
}
''', encoding='utf-8')

          history = Path('ROOT_docs/DEVELOPMENT_HISTORY.md')
          if history.exists():
              h = history.read_text(encoding='utf-8')
              heading = '## Milestone 02 - Runtime Portrait Partition Migration'
              if heading not in h:
                  h = h.rstrip() + '''\n\n## Milestone 02 - Runtime Portrait Partition Migration\n\nThe player and NPC portrait surfaces now consult the semantic portrait/entity partition index and active registry before using the legacy portrait-sheet loaders. Selection remains deterministic: player records use the existing sheet/index identity, while NPC records use a stable identity seed. Ordinary pools explicitly exclude name-locked and nonhuman/restricted entries. Name-locked records are considered only when their partition metadata matches the supplied NPC identity. The original sheet loaders remain as compatibility fallbacks when a semantic image cannot be loaded.\n\nVerification includes full Java 17 UTF-8 compilation, partition-index auditing, deterministic selection checks, pool-isolation checks, active-registry type validation, and Gate 3.\n'''
                  history.write_text(h, encoding='utf-8')
          PY

      - name: Compile Java 17 UTF-8
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/portrait-semantic-runtime
          mkdir -p ROOT_build/portrait-semantic-runtime/classes
          find src -name '*.java' -print > ROOT_build/portrait-semantic-runtime/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/portrait-semantic-runtime/classes @ROOT_build/portrait-semantic-runtime/sources.txt

      - name: Run portrait and player-facing verification
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/portrait-semantic-runtime/classes mechanist.PortraitSemanticRuntimeSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/portrait-semantic-runtime/classes mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/portrait-semantic-runtime/classes mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Commit verified portrait migration directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-portrait-semantic-runtime.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/PortraitSemanticAssetAuthority.java \
                  src/mechanist/LegacyPanelContext.java \
                  src/mechanist/PortraitSemanticRuntimeSmoke.java \
                  ROOT_docs/DEVELOPMENT_HISTORY.md \
                  .github/workflows/one-shot-portrait-semantic-runtime.yml
          git commit -m 'Route portrait pools through semantic registry partitions'
          git push origin HEAD:main
