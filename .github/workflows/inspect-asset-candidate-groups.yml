name: Inspect Asset Candidate Groups

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-asset-candidate-groups.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print selected early candidate groups
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27512546224/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          output=$(find logs -type f -iname '*Print early migration candidates*.txt' | head -1)
          python - "$output" <<'PY'
          import re, sys
          wanted = {
              'GENERIC_WALL', 'HABITATION_FLOOR', 'HABITATION_WALL',
              'MARKET_FLOOR', 'MARKET_WALL', 'NOBLE_FLOOR', 'SLUM_FLOOR',
              'STREETLIGHT_FIXTURE', 'DOOR_CLOSED'
          }
          counts = {name: 0 for name in wanted}
          with open(sys.argv[1], encoding='utf-8-sig', errors='replace') as handle:
              for raw in handle:
                  line = re.sub(r'^.*?Z ', '', raw.rstrip())
                  if not line.startswith('CANDIDATE|'):
                      continue
                  intent = line.split('|', 2)[1]
                  if intent in wanted and counts[intent] < 3:
                      print(line)
                      counts[intent] += 1
          for name in sorted(wanted):
              print(f'COUNT|{name}|{counts[name]}')
          PY
