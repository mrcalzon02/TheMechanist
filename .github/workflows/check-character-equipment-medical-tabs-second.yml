name: Recheck Character Equipment And Medical Tabs

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/check-character-equipment-medical-tabs-second.yml'

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest implementation run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          json=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-character-equipment-medical-tabs-on-push.yml/runs?event=push&per_page=1")
          id=$(echo "$json" | jq -r '.workflow_runs[0].id // empty')
          status=$(echo "$json" | jq -r '.workflow_runs[0].status // empty')
          conclusion=$(echo "$json" | jq -r '.workflow_runs[0].conclusion // empty')
          echo "run=$id status=$status conclusion=$conclusion"
          test "$status" = "completed"
          test "$conclusion" = "success"
