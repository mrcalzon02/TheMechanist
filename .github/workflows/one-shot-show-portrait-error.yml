name: One Shot Show Portrait Error

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-show-portrait-error.yml'

permissions:
  actions: read
  contents: write

jobs:
  show:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Print failed step tail
        shell: bash
        run: |
          gh run view 27517250022 --log-failed | tail -60
      - name: Remove workflow
        shell: bash
        run: |
          rm .github/workflows/one-shot-show-portrait-error.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/one-shot-show-portrait-error.yml
          git commit -m 'Remove portrait error inspection workflow'
          git push origin HEAD:main
