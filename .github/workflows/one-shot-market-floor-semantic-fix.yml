name: One Shot Market Floor Semantic Fix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  repair-and-rerun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove machine-shop false positive from market tile matching
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/mechanist/SemanticRenderAssetResolver.java')
          text = path.read_text(encoding='utf-8')
          old_floor = 'case MARKET_FLOOR -> isFloor(asset) && themed(haystack, "market", "bazaar", "shop", "commercial") && !themed(haystack, "sewer");'
          new_floor = 'case MARKET_FLOOR -> isFloor(asset) && themed(haystack, "market", "bazaar", "commercial", "retail") && !themed(haystack, "sewer");'
          old_wall = 'case MARKET_WALL -> isWall(asset) && themed(haystack, "market", "bazaar", "shop", "commercial") && !themed(haystack, "sewer");'
          new_wall = 'case MARKET_WALL -> isWall(asset) && themed(haystack, "market", "bazaar", "commercial", "retail") && !themed(haystack, "sewer");'
          if old_floor not in text or old_wall not in text:
              raise SystemExit('expected market tile resolver lines were not found')
          text = text.replace(old_floor, new_floor, 1).replace(old_wall, new_wall, 1)
          path.write_text(text, encoding='utf-8', newline='')
          PY

      - name: Commit resolver repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/SemanticRenderAssetResolver.java
          git commit -m 'Prevent machine-shop assets matching market floors'
          git push

      - name: Rerun verified character restoration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-character-paper-doll-restore-v2.yml/dispatches \
            -d '{"ref":"main"}'
