name: One Shot Inspect Portrait Run

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-inspect-portrait-run.yml'

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture latest portrait workflow failure
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(gh run list --workflow one-shot-semantic-portrait-runtime.yml --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          if [[ -z "$run_id" ]]; then
            summary='NO_RUN_FOUND'
          else
            gh run view "$run_id" --json status,conclusion,name,url,jobs > /tmp/run.json
            gh run view "$run_id" --log-failed > /tmp/failed.log 2>&1 || true
            summary="$(cat /tmp/run.json | base64 -w0)"
            failed="$(tail -120 /tmp/failed.log | base64 -w0)"
          fi
          rm .github/workflows/one-shot-inspect-portrait-run.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/one-shot-inspect-portrait-run.yml
          git commit -m 'Record semantic portrait workflow inspection' -m "RUN_JSON_B64=$summary" -m "FAILED_LOG_B64=${failed:-NONE}"
          git push origin HEAD:main
