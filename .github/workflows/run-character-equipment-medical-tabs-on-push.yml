name: Run Character Equipment And Medical Tabs On Push

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/run-character-equipment-medical-tabs-on-push.yml'

permissions:
  contents: write

jobs:
  implement-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Extract and run the checked-in implementation migration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/one-shot-character-equipment-medical-tabs.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python - <<'PY'") + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          script_lines = lines[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script_lines) + '\n'

          old = """lambda m: m.group(1) + '\\n        CharacterEquipmentAndMedicalAuthority.writeState('
                                + m.group(2) + '.equippedWearableSlots, ' + m.group(2)
                                + '.installedBodyModifications);',"""
          new = """lambda m: m.group(1) + '\\n        CharacterEquipmentAndMedicalAuthority.writeState('
                                + m.group(3) + ', ' + m.group(2) + '.equippedWearableSlots, '
                                + m.group(2) + '.installedBodyModifications);',"""
          if old not in script:
              raise SystemExit('Persistence write migration segment was not found')
          script = script.replace(old, new, 1)
          script = script.replace('return new Clothing(safe, null, 0,', 'return new Clothing(safe, Faction.NONE, 0,')
          Path('/tmp/character_equipment_medical_impl.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/character_equipment_medical_impl.py

          python - <<'PY'
          from pathlib import Path

          path = Path('src/mechanist/CharacterEquipmentAndMedicalAuthority.java')
          text = path.read_text(encoding='utf-8')
          if 'import java.util.Properties;' not in text:
              text = text.replace('import java.util.Map;\n', 'import java.util.Map;\nimport java.util.Properties;\n')

          if 'static int carryCapacityBonus' not in text:
              marker = '    private static boolean contains(String value, String... needles) {'
              if marker not in text:
                  raise SystemExit('Character equipment helper insertion marker missing')
              methods = '''    static int carryCapacityBonus(Map<EquipmentSlot, String> extraSlots) {
        if (extraSlots == null) return 0;
        String backpack = safe(extraSlots.get(EquipmentSlot.BACKPACK)).toLowerCase(Locale.ROOT);
        if (backpack.equals("empty")) return 0;
        if (contains(backpack, "expedition", "heavy", "frame pack")) return 12;
        if (contains(backpack, "rucksack", "haversack")) return 10;
        if (contains(backpack, "backpack")) return 8;
        if (contains(backpack, "satchel")) return 4;
        return 6;
    }

    static void installMedicalRecord(Map<String, String> installed, String bodyPartName,
                                     MedicalLayer layer, String installedName) {
        if (installed == null) return;
        MedicalSlotKey key = new MedicalSlotKey(bodyPartName, layer);
        if (installedName == null || installedName.isBlank()) installed.remove(key.storageKey());
        else installed.put(key.storageKey(), installedName);
    }

    static String medicalRecord(Map<String, String> installed, String bodyPartName, MedicalLayer layer) {
        if (installed == null) return "Empty";
        return safe(installed.get(new MedicalSlotKey(bodyPartName, layer).storageKey()));
    }

    static void writeState(Properties properties, Map<EquipmentSlot, String> equipment,
                           Map<String, String> medical) {
        if (properties == null) return;
        if (equipment != null) {
            for (Map.Entry<EquipmentSlot, String> entry : equipment.entrySet()) {
                if (entry.getKey() == null || entry.getValue() == null || entry.getValue().isBlank()) continue;
                properties.setProperty("character.equipment." + entry.getKey().name(), entry.getValue());
            }
        }
        if (medical != null) {
            int index = 0;
            for (Map.Entry<String, String> entry : medical.entrySet()) {
                if (entry.getKey() == null || entry.getKey().isBlank()
                        || entry.getValue() == null || entry.getValue().isBlank()) continue;
                properties.setProperty("character.medical." + index + ".key", entry.getKey());
                properties.setProperty("character.medical." + index + ".value", entry.getValue());
                index++;
            }
            properties.setProperty("character.medical.count", Integer.toString(index));
        }
    }

    static void readState(Properties properties, Map<EquipmentSlot, String> equipment,
                          Map<String, String> medical) {
        if (properties == null) return;
        if (equipment != null) {
            equipment.clear();
            for (EquipmentSlot slot : EquipmentSlot.values()) {
                if (slot == EquipmentSlot.LEFT_HAND || slot == EquipmentSlot.RIGHT_HAND
                        || slot == EquipmentSlot.CLOTHES) continue;
                String value = properties.getProperty("character.equipment." + slot.name());
                if (value != null && !value.isBlank()) equipment.put(slot, value);
            }
        }
        if (medical != null) {
            medical.clear();
            int count;
            try {
                count = Math.max(0, Integer.parseInt(properties.getProperty("character.medical.count", "0")));
            } catch (NumberFormatException ignored) {
                count = 0;
            }
            for (int i = 0; i < count; i++) {
                String key = properties.getProperty("character.medical." + i + ".key");
                String value = properties.getProperty("character.medical." + i + ".value");
                if (key != null && !key.isBlank() && value != null && !value.isBlank()) medical.put(key, value);
            }
        }
    }

'''
              text = text.replace(marker, methods + marker, 1)

          path.write_text(text, encoding='utf-8', newline='')
          PY

      - name: Compile Java 17 UTF-8
        shell: bash
        run: |
          rm -rf ROOT_build/character-equipment-medical-classes
          mkdir -p ROOT_build/character-equipment-medical-classes
          find src -name '*.java' -print > character-equipment-medical-sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/character-equipment-medical-classes @character-equipment-medical-sources.txt

      - name: Run focused and Gate 3 verification
        shell: bash
        run: |
          java -cp ROOT_build/character-equipment-medical-classes mechanist.Milestone02CharacterEquipmentMedicalSmoke
          java -cp ROOT_build/character-equipment-medical-classes mechanist.Milestone02CharacterEquipmentScreenIntegrationSmoke
          java -cp ROOT_build/character-equipment-medical-classes mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Remove one-shot workflows and build output
        shell: bash
        run: |
          rm -f .github/workflows/run-character-equipment-medical-tabs-on-push.yml
          rm -f .github/workflows/one-shot-character-equipment-medical-tabs.yml
          rm -f .github/workflows/one-shot-market-floor-semantic-fix.yml
          rm -f .github/workflows/one-shot-religious-item-semantic-fix.yml
          rm -f .github/workflows/one-shot-door-semantic-fix.yml
          rm -f character-equipment-medical-sources.txt
          rm -rf ROOT_build/character-equipment-medical-classes

      - name: Commit verified character tabs
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Expand character equipment and medical body tabs'
          git push
