name: One Shot Save Short Portrait Error

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-save-short-portrait-error.yml'

permissions:
  actions: read
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Save short failed lines
        shell: bash
        run: |
          mkdir -p ROOT_build
          gh run view 27517250022 --log-failed | awk 'length($0) < 1000' > ROOT_build/portrait_error_short.txt
          rm .github/workflows/one-shot-save-short-portrait-error.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_build/portrait_error_short.txt .github/workflows/one-shot-save-short-portrait-error.yml
          git commit -m 'Record concise semantic portrait error'
          git push origin HEAD:main
