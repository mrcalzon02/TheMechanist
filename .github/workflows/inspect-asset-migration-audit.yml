name: Inspect Asset Migration Audit

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-asset-migration-audit.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print focused audit findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27512307040/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          runtime=$(find logs -type f -iname '*actual-registry audit*.txt' | head -1)
          paths=$(find logs -type f -iname '*Audit live semantic call paths*.txt' | head -1)
          echo "RUNTIME_LOG=$runtime"
          echo "PATH_LOG=$paths"
          echo '=== ACTUAL REGISTRY COVERAGE ==='
          grep -E 'Z (ASSET_REGISTRY_SIZE=|SEMANTIC_REPORT=|SEMANTIC_COMPLETE=|FAMILY=|MISSING=|ALIAS_MAPPING_COUNT=|RESOLVER_VERSION=)' "$runtime" | sed -E 's/^.*Z //'
          echo '=== LIVE RESOLVER CALLS ==='
          sed -n '/=== LIVE RESOLVER CALLS ===/,/=== COMPILED DESCRIPTOR LOCATION AND ASSET IDS ===/p' "$paths" | sed -E 's/^.*Z //' | tail -120
          echo '=== COMPILED DESCRIPTOR AND ASSET IDS ==='
          sed -n '/=== COMPILED DESCRIPTOR LOCATION AND ASSET IDS ===/,/=== LEGACY RENDER LOOKUPS ===/p' "$paths" | sed -E 's/^.*Z //' | tail -180
          echo '=== LEGACY RENDER LOOKUPS ==='
          sed -n '/=== LEGACY RENDER LOOKUPS ===/,/=== TILE ART IMAGE METHOD ===/p' "$paths" | sed -E 's/^.*Z //' | tail -180
          echo '=== TILE ART IMAGE METHOD ==='
          sed -n '/=== TILE ART IMAGE METHOD ===/,/=== TILE SEMANTIC FALLBACK METHOD ===/p' "$paths" | sed -E 's/^.*Z //' | tail -100
          echo '=== TILE SEMANTIC FALLBACK METHOD ==='
          sed -n '/=== TILE SEMANTIC FALLBACK METHOD ===/,/=== SEMANTIC WORKFLOWS STILL PRESENT ===/p' "$paths" | sed -E 's/^.*Z //' | tail -120
          echo '=== WORKFLOWS AND RECENT COMMITS ==='
          sed -n '/=== SEMANTIC WORKFLOWS STILL PRESENT ===/,$p' "$paths" | sed -E 's/^.*Z //' | tail -120
