name: Inspect Asset Migration Audit

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-asset-migration-audit.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print concise audit findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27512307040/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          echo '=== ACTUAL REGISTRY COVERAGE ==='
          grep -RihE 'ASSET_REGISTRY_SIZE=|SEMANTIC_REPORT=|SEMANTIC_COMPLETE=|FAMILY=|MISSING=|ALIAS_MAPPING_COUNT=|RESOLVER_VERSION=' logs | sed -E 's/^.*Z //' | sort -u
          echo '=== LIVE CALLS AND LEGACY PATHS ==='
          grep -RihE 'LIVE RESOLVER CALLS|COMPILED DESCRIPTOR LOCATION|LEGACY RENDER LOOKUPS|TILE ART IMAGE METHOD|TILE SEMANTIC FALLBACK METHOD|src/mechanist/.*(SemanticRenderAssetResolver|CompiledTileDescriptor|primaryAssetId|overlayAssetId|underlayAssetId|images\.getTile|images\.getItemIcon|getSemanticAssetImage|tileArtImage)' logs | sed -E 's/^.*Z //' | tail -260
          echo '=== WORKFLOW AND RECENT COMMIT CLEANUP ==='
          grep -RihE 'SEMANTIC WORKFLOWS STILL PRESENT|RECENT SEMANTIC COMMITS|\.github/workflows/.*(semantic|asset-migration)|^[0-9a-f]{7,40} .*semantic|^[0-9a-f]{7,40} .*asset migration' logs | sed -E 's/^.*Z //' | tail -120
