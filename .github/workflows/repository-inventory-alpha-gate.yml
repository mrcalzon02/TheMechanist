name: Repository Inventory Alpha Gate

on:
  push:
    branches: [main]
    paths:
      - 'ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv'
      - 'ROOT_docs/RELEASE_CLEARANCE.tsv'
      - 'ROOT_build/ci/audit_repository_release_inventory.py'
      - 'ROOT_build/ci/certify_release_inventory.py'
      - 'ROOT_tools/update_repository_file_manifest_incremental.py'
      - '.github/workflows/repository-inventory-alpha-gate.yml'
  workflow_dispatch:
    inputs:
      update_committed_manifest:
        description: Regenerate and commit ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv on main
        type: boolean
        required: true
        default: false
      require_release_clearance:
        description: Require every exact release asset/binary hash to be approved
        type: boolean
        required: true
        default: false

concurrency:
  group: repository-inventory-alpha
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  full-repository-inventory:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Capture committed inventory state
        shell: bash
        run: |
          set -euo pipefail
          INVENTORY_DIR="$RUNNER_TEMP/mechanist-inventory-alpha"
          rm -rf "$INVENTORY_DIR"
          mkdir -p "$INVENTORY_DIR"
          echo "INVENTORY_DIR=$INVENTORY_DIR" >> "$GITHUB_ENV"
          if [[ -f ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv ]]; then
            cp ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv "$INVENTORY_DIR/committed-before.tsv"
          else
            : > "$INVENTORY_DIR/committed-before.tsv"
          fi
          git status --short

      - name: Regenerate stable full-checkout manifest
        shell: bash
        run: |
          set -euo pipefail
          python ROOT_tools/update_repository_file_manifest_incremental.py \
            --target ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv \
            --force-hash \
            2>&1 | tee "$INVENTORY_DIR/generation.log"
          cp ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv "$INVENTORY_DIR/generated.tsv"

      - name: Compare committed manifest with full checkout
        id: manifest_match
        if: ${{ !inputs.update_committed_manifest }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s "$INVENTORY_DIR/committed-before.tsv" ]]; then
            echo 'committed_empty=true' >> "$GITHUB_OUTPUT"
          else
            echo 'committed_empty=false' >> "$GITHUB_OUTPUT"
          fi
          if cmp -s "$INVENTORY_DIR/generated.tsv" "$INVENTORY_DIR/committed-before.tsv"; then
            echo 'matches=true' >> "$GITHUB_OUTPUT"
          else
            echo 'matches=false' >> "$GITHUB_OUTPUT"
            echo 'The committed repository manifest is stale or empty.' >&2
            echo 'Review the uploaded generated manifest, then dispatch with update_committed_manifest=true.' >&2
            diff -u "$INVENTORY_DIR/committed-before.tsv" "$INVENTORY_DIR/generated.tsv" \
              > "$INVENTORY_DIR/manifest-diff.txt" || true
          fi

      - name: Commit regenerated manifest
        if: ${{ inputs.update_committed_manifest || (github.event_name == 'push' && steps.manifest_match.outputs.committed_empty == 'true') }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          REMOTE_MAIN=$(git rev-parse origin/main)
          if [[ "$REMOTE_MAIN" != "$GITHUB_SHA" ]]; then
            echo "Refusing stale inventory bootstrap: origin/main=$REMOTE_MAIN trigger=$GITHUB_SHA" >&2
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv
          if git diff --cached --quiet; then
            echo 'Committed repository manifest already matches the full checkout.'
          else
            git commit -m 'Regenerate governed repository file manifest [skip ci]'
            git push origin HEAD:main
          fi

      - name: Audit exact release ownership and clearance
        shell: bash
        env:
          REQUIRE_CLEARANCE: ${{ inputs.require_release_clearance }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [[ "$REQUIRE_CLEARANCE" == 'true' ]]; then
            EXTRA+=(--require-clearance)
          fi
          python ROOT_build/ci/audit_repository_release_inventory.py \
            ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv \
            --clearance-registry ROOT_docs/RELEASE_CLEARANCE.tsv \
            --ledger "$INVENTORY_DIR/release-ownership-ledger.tsv" \
            --pending "$INVENTORY_DIR/RELEASE_CLEARANCE_PENDING.tsv" \
            --report "$INVENTORY_DIR/release-inventory-report.json" \
            "${EXTRA[@]}" \
            2>&1 | tee "$INVENTORY_DIR/audit.log"

      - name: Certify exact inventory and clearance
        if: ${{ inputs.require_release_clearance }}
        shell: bash
        run: |
          set -euo pipefail
          python ROOT_build/ci/certify_release_inventory.py \
            --generated-manifest "$INVENTORY_DIR/generated.tsv" \
            --committed-manifest ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv \
            --clearance-registry ROOT_docs/RELEASE_CLEARANCE.tsv \
            --audit-report "$INVENTORY_DIR/release-inventory-report.json" \
            --source-commit "$GITHUB_SHA" \
            --output "$INVENTORY_DIR/release-inventory-certificate.json"

      - name: Record inventory identities
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv ]]; then
            sha256sum ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv \
              > "$INVENTORY_DIR/REPOSITORY_FILE_MANIFEST.sha256"
            wc -l ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv \
              > "$INVENTORY_DIR/REPOSITORY_FILE_MANIFEST.lines.txt"
            du -h ROOT_docs/REPOSITORY_FILE_MANIFEST.tsv \
              > "$INVENTORY_DIR/REPOSITORY_FILE_MANIFEST.size.txt"
          fi
          sha256sum ROOT_docs/RELEASE_CLEARANCE.tsv \
            > "$INVENTORY_DIR/RELEASE_CLEARANCE.sha256"
          printf '%s\n' "$GITHUB_SHA" > "$INVENTORY_DIR/source-commit.txt"

      - name: Enforce committed manifest match
        if: ${{ !inputs.update_committed_manifest && !(github.event_name == 'push' && steps.manifest_match.outputs.committed_empty == 'true') && steps.manifest_match.outputs.matches != 'true' }}
        shell: bash
        run: |
          echo 'The generated full-checkout manifest differs from the committed manifest.' >&2
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Repository-Inventory-Alpha
          path: ${{ env.INVENTORY_DIR }}
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
