name: One Shot Semantic Portrait Diagnostics

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-semantic-portrait-diagnostics.yml'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Locate standards and portrait runtime surfaces
        shell: bash
        run: |
          set -euo pipefail
          echo '=== STANDARDS FILES ==='
          find . -type f \( -iname '*standards*practices*' -o -iname 'STANDARDS_AND_PRACTICES.md' \) -print | sort || true
          echo '=== DEVELOPMENT HISTORY FILES ==='
          find . -type f \( -iname '*development*history*' -o -iname '*dev*history*' \) -print | sort | head -50 || true
          echo '=== IMAGECACHE CLASS ==='
          grep -RIn --include='*.java' 'class ImageCache' src | head -20 || true
          echo '=== PORTRAIT AUTHORITY REFERENCES ==='
          grep -RIn --include='*.java' 'PortraitSemanticAssetAuthority\|getNpcPortraitFor\|getPlayerPortrait\|getPortrait(\|portraitSheets\|playerHumanPortraitCells\|npcPortraitCells\|nameLockedProfilePortraits\|npcPortraitRanges\|portraitProfiles' src | head -400 || true
          echo '=== PORTRAIT PARTITION FILES ==='
          find . -type f \( -iname '*portrait*partition*.tsv' -o -iname '*portrait*entity*.tsv' -o -iname '*portrait*partition*.csv' \) -print | sort || true
          echo '=== PORTRAIT REGISTRY ENTRIES ==='
          find . -type f \( -iname '*semantic*registry*.tsv' -o -iname '*asset*registry*.tsv' \) -print | sort | head -50 || true

      - name: Print ImageCache portrait implementation
        shell: bash
        run: |
          set -euo pipefail
          file="$(grep -RIl --include='*.java' 'class ImageCache' src | head -1 || true)"
          if [[ -z "$file" ]]; then
            echo 'ImageCache source not found'
            exit 0
          fi
          echo "IMAGE_CACHE_FILE=$file"
          for token in 'class ImageCache' 'getNpcPortraitFor' 'getNpcPortrait(' 'getPortrait(' 'loadPortrait' 'portraitSheets' 'playerHumanPortraitCells' 'npcPortraitCells'; do
            echo "--- TOKEN: $token ---"
            grep -n -F "$token" "$file" | head -30 || true
          done
          python - "$file" <<'PY'
          from pathlib import Path
          import re, sys
          p = Path(sys.argv[1])
          lines = p.read_text(encoding='utf-8').splitlines()
          needles = ('class ImageCache', 'getNpcPortraitFor', 'getNpcPortrait(', 'getPortrait(',
                     'loadPortrait', 'portraitSheets', 'playerHumanPortraitCells', 'npcPortraitCells',
                     'nameLockedProfilePortraits', 'npcPortraitRanges', 'portraitProfiles')
          centers = []
          for i, line in enumerate(lines, 1):
              if any(n in line for n in needles): centers.append(i)
          shown = set()
          for center in centers:
              start = max(1, center - 18)
              end = min(len(lines), center + 45)
              key = (start, end)
              if key in shown: continue
              shown.add(key)
              print(f'--- {p}:{start}-{end} ---')
              for n in range(start, end + 1):
                  print(f'{n:05d}: {lines[n-1]}')
          PY

      - name: Print standards summary source
        shell: bash
        run: |
          set -euo pipefail
          file="$(find . -type f \( -iname '*standards*practices*' -o -iname 'STANDARDS_AND_PRACTICES.md' \) | sort | head -1 || true)"
          if [[ -z "$file" ]]; then
            echo 'NO_STANDARDS_FILE_FOUND'
          else
            echo "STANDARDS_FILE=$file"
            sed -n '1,260p' "$file"
          fi

      - name: Remove diagnostic workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-semantic-portrait-diagnostics.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/one-shot-semantic-portrait-diagnostics.yml
          git commit -m 'Remove semantic portrait diagnostic workflow'
          git push origin HEAD:main
