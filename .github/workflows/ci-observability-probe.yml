name: CI Observability Probe

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-observability-probe.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  issues: write

jobs:
  prove-actions-token-and-api:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Prove runner and GitHub API access without external actions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$GITHUB_SHA"
          test -n "$GITHUB_RUN_ID"
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          API="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"

          python - <<'PY' > status.json
          import json, os
          print(json.dumps({
              "state": "success",
              "context": "the-mechanist/actions-observability",
              "description": "Runner and built-in token reached the GitHub API",
              "target_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }))
          PY

          STATUS_CODE=$(curl -sS -o status-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$API/statuses/$GITHUB_SHA" \
            --data-binary @status.json)

          python - "$STATUS_CODE" "$RUN_URL" <<'PY' > issue.json
          import json, os, sys
          status_code, run_url = sys.argv[1:]
          body = "\n".join([
              "## CI observability probe",
              "",
              "- Runner execution: **confirmed**",
              f"- Commit: `{os.environ['GITHUB_SHA']}`",
              f"- Run: {run_url}",
              f"- Commit-status API response: `{status_code}`",
              "",
              "This probe uses only the hosted runner shell, curl, Python, and the built-in workflow token.",
          ])
          print(json.dumps({"body": body}))
          PY

          ISSUE_CODE=$(curl -sS -o issue-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$API/issues/47/comments" \
            --data-binary @issue.json)

          echo "commit_status_http=$STATUS_CODE"
          echo "issue_comment_http=$ISSUE_CODE"
          cat status-response.json || true
          cat issue-response.json || true

          test "$STATUS_CODE" = 201
          test "$ISSUE_CODE" = 201
