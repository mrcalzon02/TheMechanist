name: CI Observability Probe

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-observability-probe.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  prove-actions-and-statuses:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Publish pending probe status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'the-mechanist/actions-observability',
              description: 'GitHub Actions probe is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Prove runner execution
        shell: bash
        run: |
          set -euo pipefail
          echo "workflow=$GITHUB_WORKFLOW"
          echo "run_id=$GITHUB_RUN_ID"
          echo "sha=$GITHUB_SHA"
          test -n "$GITHUB_SHA"

      - name: Publish successful probe status
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'the-mechanist/actions-observability',
              description: 'GitHub Actions and commit statuses are operational',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Publish failed probe status
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'the-mechanist/actions-observability',
              description: 'GitHub Actions probe failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
