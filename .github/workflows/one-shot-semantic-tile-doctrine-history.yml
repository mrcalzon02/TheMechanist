name: One Shot Semantic Tile Doctrine History

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-semantic-tile-doctrine-history.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  append-history:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append semantic tile doctrine history entry
        shell: pwsh
        run: |
          $path = 'ROOT_docs/DEVELOPMENT_HISTORY.md'
          $text = Get-Content -Raw -Encoding UTF8 $path
          $entry = @'

## Milestone 02 - Semantic Tile Set Binding Doctrine Slice

Expanded the visual asset repair lane from isolated streetlight and door corrections into a broader semantic tile-set doctrine. Added `RenderAssetBindingDoctrineAuthority` and `Milestone02RenderAssetBindingDoctrineSmoke`, then wired the smoke into `Gate3PlayerFacingTextSmokeSuite` so the project now has a durable guard stating that streetlights are infrastructure fixture art, doors resolve by open/closed door tile variants, visible tiles use fog/illumination rather than blue debug boxes, pause Main Menu and Infopedia are separate routes, and thematic tile families are not interchangeable.

The new doctrine explicitly covers sewer-vs-generic tile misuse: sewer floors/walls must be selected from sewer-themed tile families in sewer contexts, generic floors/walls remain generic, and future industrial/habitation/market tile use must declare the owning context before art selection. This does not yet prove every renderer callsite is migrated; it creates the smoke-backed semantic boundary for the next concrete renderer patches.

Verification: source and smoke wiring were committed through the connector. Required follow-up remains Java 17 compile, Gate 3 smoke execution, package seed build, manifest/Mermaid regeneration if Java ownership maps changed, and manual GUI review confirming live render paths use the intended streetlight, door, sewer, generic, and district-themed tile assets.
'@
          if ($text -notmatch 'Semantic Tile Set Binding Doctrine Slice') {
            Add-Content -Path $path -Value $entry -Encoding UTF8
          }

      - name: Remove one-shot workflow
        shell: pwsh
        run: Remove-Item '.github/workflows/one-shot-semantic-tile-doctrine-history.yml' -Force

      - name: Commit history append
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_docs/DEVELOPMENT_HISTORY.md .github/workflows/one-shot-semantic-tile-doctrine-history.yml
          if (git diff --cached --quiet) {
            Write-Host 'No changes to commit.'
          } else {
            git commit -m 'Record semantic tile binding doctrine repair'
            git push
          }
