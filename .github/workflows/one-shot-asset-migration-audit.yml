name: One Shot Asset Migration Audit

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-asset-migration-audit.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile project and actual-registry audit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/asset-migration-audit
          mkdir -p ROOT_build/asset-migration-audit/classes ROOT_build/asset-migration-audit/src/mechanist
          cat > ROOT_build/asset-migration-audit/src/mechanist/AssetMigrationRuntimeAudit.java <<'JAVA'
          package mechanist;

          import mechanist.assets.AssetManager;
          import mechanist.assets.AssetRegistry;

          public final class AssetMigrationRuntimeAudit {
              public static void main(String[] args) {
                  AssetRegistry registry = AssetManager.registry();
                  SemanticAssetMigrationCoverageAuthority.Report report =
                          SemanticAssetMigrationCoverageAuthority.audit(registry);
                  System.out.println("ASSET_REGISTRY_SIZE=" + registry.size());
                  System.out.println("SEMANTIC_REPORT=" + report.summary());
                  System.out.println("SEMANTIC_COMPLETE=" + report.complete());
                  for (SemanticAssetMigrationCoverageAuthority.Family family :
                          SemanticAssetMigrationCoverageAuthority.Family.values()) {
                      System.out.println("FAMILY=" + family
                              + " available=" + report.availableByFamily().getOrDefault(family, 0)
                              + " missing=" + report.missingByFamily().getOrDefault(family, 0));
                  }
                  for (SemanticAssetMigrationCoverageAuthority.Entry entry : report.entries()) {
                      if (!entry.available()) {
                          System.out.println("MISSING=" + entry.family() + "/" + entry.intent()
                                  + " reason=" + entry.reason());
                      }
                  }
                  System.out.println("ALIAS_MAPPING_COUNT=" + TileSemanticAssetAuthority.mappingCount());
                  System.out.println("RESOLVER_VERSION=" + SemanticRenderAssetResolver.VERSION);
              }

              private AssetMigrationRuntimeAudit() {}
          }
          JAVA
          find src -name '*.java' -print > ROOT_build/asset-migration-audit/sources.txt
          echo ROOT_build/asset-migration-audit/src/mechanist/AssetMigrationRuntimeAudit.java >> ROOT_build/asset-migration-audit/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/asset-migration-audit/classes @ROOT_build/asset-migration-audit/sources.txt
          java -Dmechanist.assetRoot="$PWD" -cp ROOT_build/asset-migration-audit/classes mechanist.AssetMigrationRuntimeAudit

      - name: Audit live semantic call paths
        shell: bash
        run: |
          set -euo pipefail
          echo '=== LIVE RESOLVER CALLS ==='
          grep -Rni --include='*.java' 'SemanticRenderAssetResolver\.' src/mechanist \
            | grep -v 'SemanticRenderAssetResolver.java' \
            | grep -v 'Smoke.java' \
            | grep -v 'SemanticAssetMigrationCoverageAuthority.java' || true

          echo '=== COMPILED DESCRIPTOR LOCATION AND ASSET IDS ==='
          grep -Rni --include='*.java' -E 'class CompiledTileDescriptor|primaryAssetId|overlayAssetId|underlayAssetId' src/mechanist || true

          echo '=== LEGACY RENDER LOOKUPS ==='
          grep -Rni --include='*.java' -E 'images\.getTile\(|images\.getItemIcon\(|images\.getObject|images\.getFixture|getTile\(.*fallback|getSemanticAssetImage\(' src/mechanist \
            | grep -v 'Smoke.java' || true

          echo '=== TILE ART IMAGE METHOD ==='
          grep -n -A14 -B4 'tileArtImage' src/mechanist/LegacyPanelContext.java || true

          echo '=== TILE SEMANTIC FALLBACK METHOD ==='
          grep -n -A35 -B5 'assetIdForAlias' src/mechanist/TileSemanticAssetAuthority.java || true

          echo '=== SEMANTIC WORKFLOWS STILL PRESENT ==='
          find .github/workflows -maxdepth 1 -type f -iname '*semantic*' -o -iname '*asset-migration*' | sort || true

          echo '=== RECENT SEMANTIC COMMITS ==='
          git log --oneline --all --grep='semantic\|asset migration' -25 || true
