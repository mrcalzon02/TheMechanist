name: Run Milestone 02 District Context

on:
  push:
    branches: [ main ]
    paths:
      - '.github/district-context.trigger'

permissions:
  contents: write
  statuses: write

jobs:
  apply-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Mark runner started
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'district-context/started',
              description: 'District context runner started'
            });

      - name: Extract and apply registered district patch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/one-shot-milestone02-district-tile-context.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          start = next((i for i, line in enumerate(lines) if line.strip() == "python - <<'PY'"), None)
          if start is None:
              raise SystemExit('Registered district patch script was not found.')
          end = next((i for i in range(start + 1, len(lines)) if lines[i].strip() == 'PY'), None)
          if end is None:
              raise SystemExit('Registered district patch terminator was not found.')
          block = lines[start + 1:end]
          prefix = '          '
          captured = [line[len(prefix):] if line.startswith(prefix) else line for line in block]
          if not any(line.strip() for line in captured):
              raise SystemExit('Registered district patch script was empty.')
          Path('ROOT_build/district-context-patch.py').parent.mkdir(parents=True, exist_ok=True)
          Path('ROOT_build/district-context-patch.py').write_text('\n'.join(captured) + '\n', encoding='utf-8')
          PY

          set +e
          python ROOT_build/district-context-patch.py >ROOT_build/district-context-patch.log 2>&1
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            cat ROOT_build/district-context-patch.log
            slug=$(tail -n 1 ROOT_build/district-context-patch.log \
              | tr '[:upper:]' '[:lower:]' \
              | tr -cs 'a-z0-9' '-' \
              | sed 's/^-//;s/-$//' \
              | cut -c1-72)
            [ -n "$slug" ] || slug='unknown-marker'
            gh api --method POST \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f context="district-context/apply-failed-${slug}" \
              -f description='District patch application failed'
            exit "$code"
          fi

      - name: Mark patch applied
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'district-context/applied',
              description: 'District source patch applied'
            });

      - name: Compile full Java source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/district-context/classes
          mkdir -p ROOT_build/district-context/classes
          find src -name '*.java' -print | sort > ROOT_build/district-context/sources.txt
          javac -encoding UTF-8 --release 17 \
            -d ROOT_build/district-context/classes \
            @ROOT_build/district-context/sources.txt

      - name: Mark compile passed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'district-context/compile',
              description: 'District candidate compiled on Java 17'
            });

      - name: Run focused district tile context smoke
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/district-context/classes \
            mechanist.Milestone02DistrictRoomTileContextSmoke

      - name: Mark focused smoke passed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'district-context/focused-smoke',
              description: 'District context focused smoke passed'
            });

      - name: Run Gate 3 player-facing smoke suite
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/district-context/classes \
            mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Mark Gate 3 passed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'district-context/gate3',
              description: 'Gate 3 suite passed for district candidate'
            });

      - name: Commit verified district tile context to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/TileDataCompilationAuthority.java \
                  src/mechanist/Milestone02DistrictRoomTileContextSmoke.java \
                  src/mechanist/Gate3PlayerFacingTextSmokeSuite.java
          if git diff --cached --quiet; then
            echo 'District tile context already present; no commit needed.'
            exit 0
          fi
          git commit -m 'Add district-aware semantic floor compilation'
          git push origin HEAD:main

      - name: Mark source commit pushed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'district-context/commit',
              description: 'Verified district source commit pushed to main'
            });

  publish-status:
    if: always()
    needs: apply-verify-commit
    runs-on: ubuntu-latest
    steps:
      - name: Publish district runner status
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.apply-verify-commit.result }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: result === 'success' ? 'success' : 'failure',
              context: 'district-context-runner',
              description: result === 'success'
                ? 'District context compiled, smoked, and committed'
                : `District context runner ${result}`
            });
