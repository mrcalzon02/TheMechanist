name: Monitor Character Paper Doll Restoration V2

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/monitor-character-paper-doll-restore-v2.yml'

permissions:
  actions: read
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check robust restoration workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          json=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-character-paper-doll-restore-v2.yml/runs?event=workflow_dispatch&per_page=1")
          id=$(echo "$json" | jq -r '.workflow_runs[0].id // empty')
          status=$(echo "$json" | jq -r '.workflow_runs[0].status // empty')
          conclusion=$(echo "$json" | jq -r '.workflow_runs[0].conclusion // empty')
          echo "run=$id status=$status conclusion=$conclusion"
          test "$status" = "completed"
          test "$conclusion" = "success"
