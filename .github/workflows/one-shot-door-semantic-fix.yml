name: One Shot Door Semantic Fix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  repair-and-rerun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject generic wall and floor fallbacks from door matching
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/mechanist/SemanticRenderAssetResolver.java')
          text = path.read_text(encoding='utf-8')
          old_closed = 'case DOOR_CLOSED -> doorType(asset) && themed(haystack, "door") && themed(haystack, "closed", "shut") && !themed(haystack, "open");'
          new_closed = 'case DOOR_CLOSED -> doorType(asset) && themed(haystack, "door") && themed(haystack, "closed", "shut") && !themed(haystack, "open") && !generic(haystack);'
          old_open = 'case DOOR_OPEN -> doorType(asset) && themed(haystack, "door") && themed(haystack, "open", "opened") && !themed(haystack, "closed", "shut");'
          new_open = 'case DOOR_OPEN -> doorType(asset) && themed(haystack, "door") && themed(haystack, "open", "opened") && !themed(haystack, "closed", "shut") && !generic(haystack);'
          if old_closed not in text or old_open not in text:
              raise SystemExit('expected door resolver lines were not found')
          text = text.replace(old_closed, new_closed, 1).replace(old_open, new_open, 1)
          path.write_text(text, encoding='utf-8', newline='')
          PY

      - name: Commit resolver repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/SemanticRenderAssetResolver.java
          git commit -m 'Reject generic tiles from semantic door matching'
          git push

      - name: Rerun verified character restoration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-character-paper-doll-restore-v2.yml/dispatches \
            -d '{"ref":"main"}'
