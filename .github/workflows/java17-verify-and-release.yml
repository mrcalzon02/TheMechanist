name: Java 17 Verify and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish verified runnable distributions as a GitHub Release
        type: boolean
        required: true
        default: false
      release_tag:
        description: Release tag for manual publication, such as v0.9.10iz
        type: string
        required: false
      prerelease:
        description: Mark a manually published release as a prerelease
        type: boolean
        required: true
        default: true

concurrency:
  group: java17-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  RELEASE_REQUESTED: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')) }}

jobs:
  verify-and-package:
    name: Build and package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Record toolchain
        shell: bash
        run: |
          set -euo pipefail
          java -version
          javac -version
          mvn -version
          python --version
          printf 'commit=%s\nplatform=%s\nrelease_requested=%s\n' "$GITHUB_SHA" "${{ matrix.platform }}" "$RELEASE_REQUESTED"

      - name: Compile and build Java 17 client and server jars
        run: mvn -B -DskipTests clean package

      - name: Run focused packaged boot smoke
        run: java -Djava.awt.headless=true -cp target/TheMechanist-all.jar mechanist.BootStartupAudioSilenceSmoke

      - name: Run packaged headless server operation smoke
        env:
          MECHANIST_SERVER_HOME: ${{ runner.temp }}/mechanist-server-smoke
        run: java -Duser.home=${{ runner.temp }}/mechanist-server-smoke -jar target/TheMechanistServer-all.jar --help

      - name: Build ordinary verified runnable distribution
        id: package_development
        if: env.RELEASE_REQUESTED != 'true'
        run: >-
          python ROOT_build/ci/build_runnable_distribution.py
          --repo .
          --commit "${{ github.sha }}"
          --output dist/releases

      - name: Build release-hardened runnable distribution
        id: package_release
        if: env.RELEASE_REQUESTED == 'true'
        run: >-
          python ROOT_build/ci/build_runnable_distribution.py
          --repo .
          --commit "${{ github.sha }}"
          --release-hardened
          --output dist/releases

      - name: Select package outputs
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ steps.package_release.outputs.distribution }}" ]]; then
            echo "distribution=${{ steps.package_release.outputs.distribution }}" >> "$GITHUB_OUTPUT"
            echo "archive=${{ steps.package_release.outputs.archive }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.package_release.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.package_release.outputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            echo "distribution=${{ steps.package_development.outputs.distribution }}" >> "$GITHUB_OUTPUT"
            echo "archive=${{ steps.package_development.outputs.archive }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.package_development.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.package_development.outputs.platform }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify distribution layout, hashes, entry points, Java 17 classfiles, and ZIP
        run: >-
          python ROOT_build/ci/verify_runnable_distribution.py
          "${{ steps.package.outputs.distribution }}"
          --archive "${{ steps.package.outputs.archive }}"
          --report "dist/releases/verification-${{ matrix.platform }}.json"

      - name: Run staged headless server
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.package.outputs.distribution }}'
          HOME="$RUNNER_TEMP/mechanist-staged-server" \
            "$DIST/runtime/bin/java" \
            -cp "$DIST/packages/server/TheMechanistServer.jar:$DIST/packages/support/lib/*" \
            mechanist.MechanistServerMain --help

      - name: Run staged headless server
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.package.outputs.distribution }}'
          $env:USERPROFILE = "$env:RUNNER_TEMP/mechanist-staged-server"
          & "$dist/runtime/bin/java.exe" `
            -cp "$dist/packages/server/TheMechanistServer.jar;$dist/packages/support/lib/*" `
            mechanist.MechanistServerMain --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload runnable distribution and verification report
        uses: actions/upload-artifact@v4
        with:
          name: TheMechanist-${{ steps.package.outputs.version }}-${{ steps.package.outputs.platform }}
          path: |
            ${{ steps.package.outputs.archive }}
            dist/releases/verification-${{ matrix.platform }}.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Publish platform build summary
        shell: bash
        run: |
          {
            echo "## Java 17 package prerequisite — ${{ matrix.platform }}"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Version: \`${{ steps.package.outputs.version }}\`"
            echo "- Java 17 compile: passed"
            echo "- Client boot smoke: passed"
            echo "- Server operation smoke: passed"
            echo "- Initial distribution verification: passed"
            echo "- Gate 3: deferred to the downstream certification job"
          } >> "$GITHUB_STEP_SUMMARY"

  gate3-certification:
    name: Gate 3 after package completion (${{ matrix.platform }})
    needs: verify-and-package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64

    steps:
      - name: Download completed platform distribution
        uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*-${{ matrix.platform }}
          path: gate3-assets
          merge-multiple: true

      - name: Extract verified distribution
        id: extracted
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE=$(find gate3-assets -maxdepth 1 -type f -name '*.zip' | head -n 1)
          test -n "$ARCHIVE"
          rm -rf gate3-dist
          mkdir -p gate3-dist
          python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall('gate3-dist')"
          DIST=$(find gate3-dist -mindepth 1 -maxdepth 1 -type d -name 'TheMechanist-*' | head -n 1)
          test -n "$DIST"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"

      - name: Run Gate 3 from completed Linux distribution
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.extracted.outputs.distribution }}'
          "$DIST/runtime/bin/java" -Djava.awt.headless=true \
            -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" \
            mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Run Gate 3 from completed Windows distribution
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.extracted.outputs.distribution }}'
          & "$dist/runtime/bin/java.exe" '-Djava.awt.headless=true' `
            -cp "$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*" `
            mechanist.Gate3PlayerFacingTextSmokeSuite
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish Gate 3 summary
        shell: bash
        run: |
          {
            echo "## Downstream Gate 3 certification — ${{ matrix.platform }}"
            echo
            echo "- Package prerequisites completed before Gate 3: yes"
            echo "- Gate 3 from staged runnable distribution: passed"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  record-release-history:
    name: Record verified release history
    needs: gate3-certification
    if: ${{ env.RELEASE_REQUESTED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      history_sha: ${{ steps.commit.outputs.history_sha }}
      version: ${{ steps.identity.outputs.version }}
      tag: ${{ steps.identity.outputs.tag }}

    steps:
      - name: Check out main for verified history update
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified platform reports and distributions
        uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true

      - name: Resolve verified release identity
        id: identity
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION=$(python - <<'PY'
          import glob, json, os
          reports = [json.load(open(path, encoding='utf-8')) for path in glob.glob('release-assets/**/verification-*.json', recursive=True)]
          versions = {str(r.get('version', '')) for r in reports}
          commits = {str(r.get('commit', '')) for r in reports}
          platforms = {str(r.get('platform', '')) for r in reports}
          statuses = {str(r.get('status', '')) for r in reports}
          if len(versions) != 1 or '' in versions: raise SystemExit(f'version mismatch: {sorted(versions)}')
          if commits != {os.environ['GITHUB_SHA']}: raise SystemExit(f'commit mismatch: {sorted(commits)}')
          if not {'linux-x64', 'windows-x64'}.issubset(platforms): raise SystemExit(f'platform mismatch: {sorted(platforms)}')
          if statuses != {'verified'}: raise SystemExit(f'status mismatch: {sorted(statuses)}')
          print(next(iter(versions)))
          PY
          )
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
          elif [[ -n "$MANUAL_TAG" ]]; then
            TAG="$MANUAL_TAG"
          else
            TAG="v$VERSION"
          fi
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "Release tag $TAG does not match verified version v$VERSION." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Append idempotent verified release history entry
        run: >-
          python ROOT_build/ci/record_verified_release.py
          --history ROOT_docs/DEVELOPMENT_HISTORY.md
          --reports 'release-assets/**/verification-*.json'
          --commit '${{ github.sha }}'
          --run-url '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Commit verified development history
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_docs/DEVELOPMENT_HISTORY.md
          if git diff --cached --quiet; then
            echo "No new history entry was required."
          else
            git commit -m "Record verified remote release ${{ steps.identity.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi
          echo "history_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  final-distribution-certification:
    name: Final distribution certification after history
    needs: record-release-history
    if: ${{ env.RELEASE_REQUESTED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.record-release-history.outputs.history_sha }}

      - name: Download release candidates
        uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true

      - name: Reverify both runnable distributions after history record
        shell: bash
        run: |
          set -euo pipefail
          rm -rf final-check
          mkdir -p final-check
          COUNT=0
          for ARCHIVE in release-assets/*.zip; do
            test -f "$ARCHIVE"
            NAME=$(basename "$ARCHIVE" .zip)
            DEST="final-check/$NAME"
            mkdir -p "$DEST"
            python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall(r'$DEST')"
            DIST="$DEST/$NAME"
            PLATFORM=$(python -c "import json; print(json.load(open(r'$DIST/manifests/runtime-manifest.json', encoding='utf-8'))['platform'])")
            REPORT="release-assets/verification-$PLATFORM.json"
            python ROOT_build/ci/verify_runnable_distribution.py "$DIST" --archive "$ARCHIVE" --report "final-check/final-$PLATFORM.json"
            python -c "import json; a=json.load(open(r'$REPORT')); b=json.load(open(r'final-check/final-$PLATFORM.json')); assert a['commit']==b['commit']=='${{ github.sha }}'; assert a['version']==b['version']=='${{ needs.record-release-history.outputs.version }}'; assert b['status']=='verified'"
            COUNT=$((COUNT + 1))
          done
          test "$COUNT" -eq 2

      - name: Publish final certification summary
        shell: bash
        run: |
          {
            echo "## Final distribution certification"
            echo
            echo "- Verified source commit: \`${{ github.sha }}\`"
            echo "- Development-history commit: \`${{ needs.record-release-history.outputs.history_sha }}\`"
            echo "- Version: \`${{ needs.record-release-history.outputs.version }}\`"
            echo "- Linux and Windows archives reverified after history update: passed"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    name: Publish verified GitHub Release
    needs: [record-release-history, final-distribution-certification]
    if: ${{ env.RELEASE_REQUESTED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download certified release assets
        uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f -name '*.zip' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.record-release-history.outputs.tag }}
          TARGET: ${{ needs.record-release-history.outputs.history_sha }}
          PRERELEASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find release-assets -maxdepth 1 -type f \( -name '*.zip' -o -name 'SHA256SUMS.txt' -o -name 'verification-*.json' \) | sort)
          if [[ ${#ASSETS[@]} -lt 5 ]]; then
            echo "Expected two ZIPs, two verification reports, and checksums." >&2
            exit 1
          fi
          EXTRA=()
          if [[ "$PRERELEASE" == "true" ]]; then EXTRA+=(--prerelease); fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --target "$TARGET" \
              --title "The Mechanist $TAG" \
              --generate-notes \
              "${EXTRA[@]}"
          fi

      - name: Publish release summary
        shell: bash
        run: |
          {
            echo "## GitHub Release published"
            echo
            echo "- Tag: \`${{ needs.record-release-history.outputs.tag }}\`"
            echo "- Version: \`${{ needs.record-release-history.outputs.version }}\`"
            echo "- Verified source commit: \`${{ github.sha }}\`"
            echo "- History/release target: \`${{ needs.record-release-history.outputs.history_sha }}\`"
            echo "- Java 17 compile, packaged operation, downstream Gate 3, history update, and final distribution recertification all passed before publication"
          } >> "$GITHUB_STEP_SUMMARY"
