name: Java 17 Verify and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish verified runnable distributions as a GitHub Release
        type: boolean
        required: true
        default: false
      release_tag:
        description: Release tag for manual publication, such as v0.9.10iz
        type: string
        required: false
      prerelease:
        description: Mark a manually published release as a prerelease
        type: boolean
        required: true
        default: true

concurrency:
  group: java17-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  RELEASE_REQUESTED: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')) }}

jobs:
  build-package:
    name: Build and package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Record exact toolchain
        shell: bash
        run: |
          set -euo pipefail
          java -version
          javac -version
          mvn -version
          python --version
          echo "commit=$GITHUB_SHA platform=${{ matrix.platform }} release=$RELEASE_REQUESTED"
      - name: Compile Java 17 client and server
        run: mvn -B -DskipTests clean package
      - name: Run focused client boot smoke
        run: java -Djava.awt.headless=true -cp target/TheMechanist-all.jar mechanist.BootStartupAudioSilenceSmoke
      - name: Run packaged headless server smoke
        run: java -Duser.home=${{ runner.temp }}/mechanist-server-smoke -jar target/TheMechanistServer-all.jar --help
      - name: Build ordinary runnable distribution
        id: ordinary
        if: env.RELEASE_REQUESTED != 'true'
        run: >-
          python ROOT_build/ci/build_runnable_distribution.py
          --repo . --commit "${{ github.sha }}" --output dist/releases
      - name: Build release-hardened runnable distribution
        id: hardened
        if: env.RELEASE_REQUESTED == 'true'
        run: >-
          python ROOT_build/ci/build_runnable_distribution.py
          --repo . --commit "${{ github.sha }}" --release-hardened --output dist/releases
      - name: Select outputs
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ steps.hardened.outputs.distribution }}" ]]; then
            echo "distribution=${{ steps.hardened.outputs.distribution }}" >> "$GITHUB_OUTPUT"
            echo "archive=${{ steps.hardened.outputs.archive }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.hardened.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.hardened.outputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            echo "distribution=${{ steps.ordinary.outputs.distribution }}" >> "$GITHUB_OUTPUT"
            echo "archive=${{ steps.ordinary.outputs.archive }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.ordinary.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.ordinary.outputs.platform }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify staged distribution
        run: >-
          python ROOT_build/ci/verify_runnable_distribution.py
          "${{ steps.package.outputs.distribution }}"
          --archive "${{ steps.package.outputs.archive }}"
          --report "dist/releases/verification-${{ matrix.platform }}.json"
      - name: Run staged server on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          DIST='${{ steps.package.outputs.distribution }}'
          HOME="$RUNNER_TEMP/mechanist-staged-server" "$DIST/runtime/bin/java" \
            -cp "$DIST/packages/server/TheMechanistServer.jar:$DIST/packages/support/lib/*" \
            mechanist.MechanistServerMain --help
      - name: Run staged server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.package.outputs.distribution }}'
          $env:USERPROFILE = "$env:RUNNER_TEMP/mechanist-staged-server"
          & "$dist/runtime/bin/java.exe" -cp "$dist/packages/server/TheMechanistServer.jar;$dist/packages/support/lib/*" mechanist.MechanistServerMain --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        with:
          name: TheMechanist-${{ steps.package.outputs.version }}-${{ steps.package.outputs.platform }}
          path: |
            ${{ steps.package.outputs.archive }}
            dist/releases/verification-${{ matrix.platform }}.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  gate3:
    name: Gate 3 after package completion (${{ matrix.platform }})
    needs: build-package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*-${{ matrix.platform }}
          path: gate3-assets
          merge-multiple: true
      - name: Extract completed distribution
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE=$(find gate3-assets -maxdepth 1 -type f -name '*.zip' | head -n 1)
          test -n "$ARCHIVE"
          mkdir -p gate3-dist
          python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall('gate3-dist')"
          DIST=$(find gate3-dist -mindepth 1 -maxdepth 1 -type d -name 'TheMechanist-*' | head -n 1)
          test -n "$DIST"
          echo "root=$DIST" >> "$GITHUB_OUTPUT"
      - name: Run Gate 3 from Linux distribution
        if: runner.os == 'Linux'
        shell: bash
        run: |
          DIST='${{ steps.dist.outputs.root }}'
          "$DIST/runtime/bin/java" -Djava.awt.headless=true \
            -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" \
            mechanist.Gate3PlayerFacingTextSmokeSuite
      - name: Run Gate 3 from Windows distribution
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.dist.outputs.root }}'
          & "$dist/runtime/bin/java.exe" '-Djava.awt.headless=true' -cp "$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*" mechanist.Gate3PlayerFacingTextSmokeSuite
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  synthetic-environment:
    name: Synthetic end-user environment (${{ matrix.platform }})
    needs: gate3
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*-${{ matrix.platform }}
          path: synthetic-assets
          merge-multiple: true
      - name: Extract completed distribution
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE=$(find synthetic-assets -maxdepth 1 -type f -name '*.zip' | head -n 1)
          test -n "$ARCHIVE"
          mkdir -p synthetic-dist
          python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall('synthetic-dist')"
          DIST=$(find synthetic-dist -mindepth 1 -maxdepth 1 -type d -name 'TheMechanist-*' | head -n 1)
          test -n "$DIST"
          echo "root=$DIST" >> "$GITHUB_OUTPUT"
      - name: Run isolated profile, path, read-only, Gate 3, server, and corruption tests
        run: >-
          python ROOT_build/ci/run_synthetic_distribution_tests.py
          "${{ steps.dist.outputs.root }}"
          --verifier ROOT_build/ci/verify_runnable_distribution.py
          --report "synthetic-report-${{ matrix.platform }}.json"
      - name: Install Linux virtual display
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run Linux Xvfb packaged GUI startup
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.dist.outputs.root }}'
          PROFILE="$RUNNER_TEMP/Mechanist GUI Profile With Spaces"
          mkdir -p "$PROFILE"
          set +e
          HOME="$PROFILE" timeout 15s xvfb-run -a "$DIST/runtime/bin/java" \
            -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" \
            mechanist.TheMechanist
          CODE=$?
          set -e
          if [[ "$CODE" -ne 124 && "$CODE" -ne 0 ]]; then exit "$CODE"; fi
      - name: Run Windows packaged GUI startup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.dist.outputs.root }}'
          $profile = "$env:RUNNER_TEMP\Mechanist GUI Profile With Spaces"
          New-Item -ItemType Directory -Force -Path $profile | Out-Null
          $env:USERPROFILE = $profile
          $args = @('-cp', "$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*", 'mechanist.TheMechanist')
          $p = Start-Process -FilePath "$dist/runtime/bin/java.exe" -ArgumentList $args -PassThru -WorkingDirectory $env:RUNNER_TEMP
          Start-Sleep -Seconds 12
          if ($p.HasExited -and $p.ExitCode -ne 0) { exit $p.ExitCode }
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force }
      - uses: actions/upload-artifact@v4
        with:
          name: Synthetic-${{ matrix.platform }}
          path: synthetic-report-${{ matrix.platform }}.json
          if-no-files-found: error
          retention-days: 30

  record-history:
    name: Update development history after synthetic certification
    needs: synthetic-environment
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      history_sha: ${{ steps.commit.outputs.history_sha }}
      version: ${{ steps.identity.outputs.version }}
      tag: ${{ steps.identity.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true
      - name: Resolve release identity
        id: identity
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION=$(python - <<'PY'
          import glob, json, os
          reports=[json.load(open(p,encoding='utf-8')) for p in glob.glob('release-assets/**/verification-*.json',recursive=True)]
          versions={str(r.get('version','')) for r in reports}; commits={str(r.get('commit','')) for r in reports}
          platforms={str(r.get('platform','')) for r in reports}; statuses={str(r.get('status','')) for r in reports}
          if len(versions)!=1 or '' in versions: raise SystemExit(f'version mismatch: {sorted(versions)}')
          if commits!={os.environ['GITHUB_SHA']}: raise SystemExit(f'commit mismatch: {sorted(commits)}')
          if not {'linux-x64','windows-x64'}.issubset(platforms): raise SystemExit(f'platform mismatch: {sorted(platforms)}')
          if statuses!={'verified'}: raise SystemExit(f'status mismatch: {sorted(statuses)}')
          print(next(iter(versions)))
          PY
          )
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then TAG="$GITHUB_REF_NAME"; elif [[ -n "$MANUAL_TAG" ]]; then TAG="$MANUAL_TAG"; else TAG="v$VERSION"; fi
          test "$TAG" = "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Record verified release
        run: >-
          python ROOT_build/ci/record_verified_release.py
          --history ROOT_docs/DEVELOPMENT_HISTORY.md
          --reports 'release-assets/**/verification-*.json'
          --commit '${{ github.sha }}'
          --run-url '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
      - name: Commit verified history
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_docs/DEVELOPMENT_HISTORY.md
          if ! git diff --cached --quiet; then
            git commit -m "Record verified remote release ${{ steps.identity.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi
          echo "history_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  final-certification:
    name: Reverify distributions after history update
    needs: record-history
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.record-history.outputs.history_sha }}
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true
      - name: Reverify Linux and Windows archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final-check
          COUNT=0
          for ARCHIVE in release-assets/*.zip; do
            NAME=$(basename "$ARCHIVE" .zip)
            DEST="final-check/$NAME"
            mkdir -p "$DEST"
            python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall(r'$DEST')"
            DIST="$DEST/$NAME"
            PLATFORM=$(python -c "import json; print(json.load(open(r'$DIST/manifests/runtime-manifest.json',encoding='utf-8'))['platform'])")
            python ROOT_build/ci/verify_runnable_distribution.py "$DIST" --archive "$ARCHIVE" --report "final-check/final-$PLATFORM.json"
            python -c "import json; r=json.load(open(r'final-check/final-$PLATFORM.json')); assert r['commit']=='${{ github.sha }}'; assert r['version']=='${{ needs.record-history.outputs.version }}'; assert r['status']=='verified'"
            COUNT=$((COUNT+1))
          done
          test "$COUNT" -eq 2

  publish-release:
    name: Publish GitHub Release
    needs: [record-history, final-certification]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true
      - name: Build release checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f -name '*.zip' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.record-history.outputs.tag }}
          TARGET: ${{ needs.record-history.outputs.history_sha }}
          PRERELEASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find release-assets -maxdepth 1 -type f \( -name '*.zip' -o -name 'verification-*.json' -o -name 'SHA256SUMS.txt' \) | sort)
          test ${#ASSETS[@]} -ge 5
          EXTRA=(); if [[ "$PRERELEASE" == 'true' ]]; then EXTRA+=(--prerelease); fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" --target "$TARGET" --title "The Mechanist $TAG" --generate-notes "${EXTRA[@]}"
          fi
