name: Java 17 Verify and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: Publish a verified portable prerelease after all gates pass
        type: boolean
        required: true
        default: false
      release_tag:
        description: Optional exact tag such as v0.9.10iz
        type: string
        required: false

concurrency:
  group: java17-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-package:
    name: Build package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture toolchain
        shell: bash
        run: |
          mkdir -p ci-logs dist/releases
          {
            java -version
            javac -version
            mvn -version
            python --version
            echo "commit=$GITHUB_SHA"
            echo "platform=${{ matrix.platform }}"
          } 2>&1 | tee ci-logs/toolchain-${{ matrix.platform }}.log
      - name: Verify Python release tools parse
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q ROOT_build/ci 2>&1 | tee ci-logs/python-syntax-${{ matrix.platform }}.log
      - name: Verify Linux packaging shell syntax
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          bash -n scripts/package/build-linux-installers.sh 2>&1 | tee ci-logs/linux-package-syntax.log
      - name: Verify Windows packaging PowerShell syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path 'scripts/package/build-windows-installers.ps1'),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Verify release hardening policies
        shell: bash
        run: |
          set -o pipefail
          python ROOT_build/ci/verify_proguard_configuration.py \
            --repo . \
            --report "dist/releases/proguard-policy-${{ matrix.platform }}.json" \
            2>&1 | tee ci-logs/proguard-policy-${{ matrix.platform }}.log
      - name: Compile Java 17 client and server
        shell: bash
        run: |
          set -o pipefail
          mvn -B -DskipTests clean package 2>&1 | tee ci-logs/maven-${{ matrix.platform }}.log
      - name: Run focused boot smoke
        shell: bash
        run: |
          set -o pipefail
          java -Djava.awt.headless=true -cp target/TheMechanist-all.jar mechanist.BootStartupAudioSilenceSmoke 2>&1 | tee ci-logs/boot-${{ matrix.platform }}.log
      - name: Run server operation smoke
        shell: bash
        run: |
          set -o pipefail
          java -Duser.home="${{ runner.temp }}/mechanist-server-smoke" -jar target/TheMechanistServer-all.jar --help 2>&1 | tee ci-logs/server-${{ matrix.platform }}.log
      - name: Build portable distribution
        id: package
        shell: bash
        run: |
          set -o pipefail
          python ROOT_build/ci/build_runnable_distribution.py --repo . --commit "$GITHUB_SHA" --output dist/releases 2>&1 | tee ci-logs/package-${{ matrix.platform }}.log
          ARCHIVE=$(find dist/releases -maxdepth 1 -type f -name 'TheMechanist-*.zip' | head -n 1)
          DIST=$(find dist/releases -maxdepth 1 -type d -name 'TheMechanist-*' | head -n 1)
          test -n "$ARCHIVE" && test -n "$DIST"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
      - name: Verify distribution
        shell: bash
        run: |
          set -o pipefail
          python ROOT_build/ci/verify_runnable_distribution.py \
            "${{ steps.package.outputs.distribution }}" \
            --archive "${{ steps.package.outputs.archive }}" \
            --report "dist/releases/verification-${{ matrix.platform }}.json" \
            2>&1 | tee ci-logs/verify-${{ matrix.platform }}.log
      - name: Upload package and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TheMechanist-${{ matrix.platform }}
          path: |
            dist/releases/*.zip
            dist/releases/proguard-policy-${{ matrix.platform }}.json
            dist/releases/verification-${{ matrix.platform }}.json
            ci-logs/*.log
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

  gate3:
    name: Gate 3 (${{ matrix.platform }})
    needs: build-package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: TheMechanist-${{ matrix.platform }}
          path: package
      - name: Extract package
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE=$(find package -type f -name '*.zip' | head -n 1)
          test -n "$ARCHIVE"
          mkdir extracted
          python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall('extracted')"
          DIST=$(find extracted -mindepth 1 -maxdepth 1 -type d -name 'TheMechanist-*' | head -n 1)
          test -n "$DIST"
          echo "root=$DIST" >> "$GITHUB_OUTPUT"
      - name: Run packaged Gate 3 on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.dist.outputs.root }}'
          PROFILE="$RUNNER_TEMP/Mechanist Gate3 Profile"
          mkdir -p "$PROFILE"
          "$DIST/runtime/bin/java" -Duser.home="$PROFILE" -Djava.awt.headless=true -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" mechanist.Gate3PlayerFacingTextSmokeSuite
      - name: Run packaged Gate 3 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist='${{ steps.dist.outputs.root }}'
          $profile="$env:RUNNER_TEMP\Mechanist Gate3 Profile"
          New-Item -ItemType Directory -Force -Path $profile | Out-Null
          & "$dist/runtime/bin/java.exe" "-Duser.home=$profile" '-Djava.awt.headless=true' -cp "$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*" mechanist.Gate3PlayerFacingTextSmokeSuite
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  synthetic-environment:
    name: Synthetic environment (${{ matrix.platform }})
    needs: gate3
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: TheMechanist-${{ matrix.platform }}
          path: package
      - name: Extract package
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE=$(find package -type f -name '*.zip' | head -n 1)
          test -n "$ARCHIVE"
          mkdir extracted
          python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall('extracted')"
          DIST=$(find extracted -mindepth 1 -maxdepth 1 -type d -name 'TheMechanist-*' | head -n 1)
          test -n "$DIST"
          echo "root=$DIST" >> "$GITHUB_OUTPUT"
      - name: Run synthetic distribution auditor
        run: >-
          python ROOT_build/ci/run_synthetic_distribution_tests.py
          "${{ steps.dist.outputs.root }}"
          --verifier ROOT_build/ci/verify_runnable_distribution.py
          --report synthetic-${{ matrix.platform }}.json
      - name: Install Xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run Linux main GUI startup under Xvfb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.dist.outputs.root }}'
          PROFILE="$RUNNER_TEMP/Mechanist GUI Profile"
          mkdir -p "$PROFILE"
          set +e
          HOME="$PROFILE" timeout 15s xvfb-run -a "$DIST/runtime/bin/java" -Duser.home="$PROFILE" -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" mechanist.TheMechanist
          CODE=$?
          set -e
          if [[ "$CODE" -ne 124 && "$CODE" -ne 0 ]]; then exit "$CODE"; fi
      - name: Run Linux remote lobby startup under Xvfb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.dist.outputs.root }}'
          PROFILE="$RUNNER_TEMP/Mechanist Remote Lobby Profile"
          mkdir -p "$PROFILE"
          set +e
          HOME="$PROFILE" timeout 15s xvfb-run -a "$DIST/runtime/bin/java" -Duser.home="$PROFILE" -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" mechanist.RemoteClientMain
          CODE=$?
          set -e
          if [[ "$CODE" -ne 124 && "$CODE" -ne 0 ]]; then exit "$CODE"; fi
      - name: Run Windows main GUI startup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist='${{ steps.dist.outputs.root }}'
          $profile="$env:RUNNER_TEMP\Mechanist GUI Profile"
          New-Item -ItemType Directory -Force -Path $profile | Out-Null
          $args=@("-Duser.home=$profile",'-cp',"$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*",'mechanist.TheMechanist')
          $p=Start-Process -FilePath "$dist/runtime/bin/java.exe" -ArgumentList $args -PassThru -WorkingDirectory $env:RUNNER_TEMP
          Start-Sleep -Seconds 12
          if ($p.HasExited -and $p.ExitCode -ne 0) { exit $p.ExitCode }
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force }
      - name: Run Windows remote lobby startup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist='${{ steps.dist.outputs.root }}'
          $profile="$env:RUNNER_TEMP\Mechanist Remote Lobby Profile"
          New-Item -ItemType Directory -Force -Path $profile | Out-Null
          $args=@("-Duser.home=$profile",'-cp',"$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*",'mechanist.RemoteClientMain')
          $p=Start-Process -FilePath "$dist/runtime/bin/java.exe" -ArgumentList $args -PassThru -WorkingDirectory $env:RUNNER_TEMP
          Start-Sleep -Seconds 12
          if ($p.HasExited -and $p.ExitCode -ne 0) { exit $p.ExitCode }
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Synthetic-${{ matrix.platform }}
          path: synthetic-${{ matrix.platform }}.json
          if-no-files-found: warn
          retention-days: 30

  record-history:
    name: Record verified prerelease history
    needs: synthetic-environment
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_prerelease }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      history_sha: ${{ steps.commit.outputs.history_sha }}
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: Synthetic-*
          path: synthetic-assets
          merge-multiple: true
      - name: Verify synthetic release contract
        run: >-
          python ROOT_build/ci/verify_synthetic_release_contract.py
          synthetic-assets/synthetic-*.json
          --expected-platforms linux-x64,windows-x64
          --require-release-hardened
          --require-native-stage
          --report synthetic-assets/release-contract.json
      - name: Resolve identity
        id: identity
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION=$(python - <<'PY'
          import glob,json,os
          reports=[json.load(open(p,encoding='utf-8')) for p in glob.glob('release-assets/verification-*.json')]
          versions={r['version'] for r in reports}
          commits={r['commit'] for r in reports}
          platforms={r['platform'] for r in reports}
          statuses={r['status'] for r in reports}
          remote={r.get('remoteClientEntryPoint') for r in reports}
          hardened={r.get('releaseHardened') for r in reports}
          if len(reports)!=2 or len(versions)!=1: raise SystemExit('expected exactly two matching verification reports')
          if commits!={os.environ['GITHUB_SHA']}: raise SystemExit(f'commit mismatch: {sorted(commits)}')
          if platforms!={'linux-x64','windows-x64'}: raise SystemExit(f'platform mismatch: {sorted(platforms)}')
          if statuses!={'verified'}: raise SystemExit(f'verification status mismatch: {sorted(statuses)}')
          if remote!={'mechanist.RemoteClientMain'}: raise SystemExit(f'remote entry mismatch: {sorted(remote)}')
          if hardened!={True}: raise SystemExit(f'release hardening mismatch: {sorted(hardened)}')
          print(next(iter(versions)))
          PY
          )
          TAG="${REQUESTED_TAG:-v$VERSION}"
          test "$TAG" = "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Record verified release
        run: >-
          python ROOT_build/ci/record_verified_release.py
          --history ROOT_docs/DEVELOPMENT_HISTORY.md
          --reports 'release-assets/verification-*.json'
          --synthetic-reports 'synthetic-assets/synthetic-*.json'
          --commit '${{ github.sha }}'
          --run-url '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
      - name: Commit history
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_docs/DEVELOPMENT_HISTORY.md
          if ! git diff --cached --quiet; then
            git commit -m 'Record verified remote prerelease [skip ci]'
            git push origin HEAD:main
          fi
          echo "history_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release-certification:
    name: Final immutable distribution certification
    needs: [record-history, synthetic-environment]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_prerelease }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      checksums: ${{ steps.certify.outputs.checksums }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.record-history.outputs.history_sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: Synthetic-*
          path: synthetic-assets
          merge-multiple: true
      - name: Reopen and certify release artifacts
        id: certify
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.record-history.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p final-certification
          ZIP_COUNT=0
          for ARCHIVE in release-assets/TheMechanist-*.zip; do
            test -f "$ARCHIVE"
            NAME=$(basename "$ARCHIVE" .zip)
            DEST="final-certification/$NAME"
            mkdir -p "$DEST"
            python -c "import zipfile; zipfile.ZipFile(r'$ARCHIVE').extractall(r'$DEST')"
            DIST="$DEST/$NAME"
            PLATFORM=$(python -c "import json; print(json.load(open(r'$DIST/manifests/runtime-manifest.json',encoding='utf-8'))['platform'])")
            python ROOT_build/ci/verify_runnable_distribution.py \
              "$DIST" \
              --archive "$ARCHIVE" \
              --require-release-hardened \
              --report "final-certification/final-$PLATFORM.json"
            python -c "import json,os; r=json.load(open(r'final-certification/final-$PLATFORM.json')); assert r['commit']==os.environ['SOURCE_SHA']; assert r['version']==os.environ['RELEASE_VERSION']; assert r['status']=='verified'; assert r['releaseHardened'] is True; assert r['remoteClientEntryPoint']=='mechanist.RemoteClientMain'"
            ZIP_COUNT=$((ZIP_COUNT+1))
          done
          test "$ZIP_COUNT" -eq 2
          python ROOT_build/ci/verify_synthetic_release_contract.py \
            synthetic-assets/synthetic-*.json \
            --expected-platforms linux-x64,windows-x64 \
            --require-release-hardened \
            --require-native-stage \
            --report final-certification/final-synthetic-contract.json
          (cd release-assets && sha256sum TheMechanist-*.zip > SHA256SUMS.txt)
          echo "checksums=release-assets/SHA256SUMS.txt" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: Release-Certification
          path: |
            release-assets/SHA256SUMS.txt
            final-certification/final-*.json
          if-no-files-found: error
          retention-days: 90

  publish-prerelease:
    name: Publish verified prerelease
    needs: [record-history, release-certification]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_prerelease }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: Synthetic-*
          path: synthetic-assets
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: Release-Certification
          path: certification-assets
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.record-history.outputs.tag }}
          TARGET: ${{ needs.record-history.outputs.history_sha }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find release-assets synthetic-assets certification-assets -type f \( -name '*.zip' -o -name 'verification-*.json' -o -name 'synthetic-*.json' -o -name 'final-*.json' -o -name 'release-contract.json' -o -name 'SHA256SUMS.txt' \) | sort)
          test ${#ASSETS[@]} -ge 10
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" --target "$TARGET" --title "The Mechanist $TAG" --generate-notes --prerelease
          fi
