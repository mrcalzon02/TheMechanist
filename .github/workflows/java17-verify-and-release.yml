name: Java 17 Verify and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish verified runnable distributions as a GitHub Release
        type: boolean
        required: true
        default: false
      release_tag:
        description: Release tag for manual publication, such as v0.9.10iz
        type: string
        required: false
      prerelease:
        description: Mark a manually published release as a prerelease
        type: boolean
        required: true
        default: true

concurrency:
  group: java17-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  verify-and-package:
    name: Verify and package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Record toolchain
        shell: bash
        run: |
          set -euo pipefail
          java -version
          javac -version
          mvn -version
          python --version
          printf 'commit=%s\nplatform=%s\n' "$GITHUB_SHA" "${{ matrix.platform }}"

      - name: Compile and build Java 17 client and server jars
        run: mvn -B -DskipTests clean package

      - name: Run Gate 3 authoritative smoke suite
        run: java -Djava.awt.headless=true -cp target/TheMechanist-all.jar mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Run focused packaged boot smoke
        run: java -Djava.awt.headless=true -cp target/TheMechanist-all.jar mechanist.BootStartupAudioSilenceSmoke

      - name: Run packaged headless server operation smoke
        env:
          MECHANIST_SERVER_HOME: ${{ runner.temp }}/mechanist-server-smoke
        run: java -Duser.home=${{ runner.temp }}/mechanist-server-smoke -jar target/TheMechanistServer-all.jar --help

      - name: Build ordinary verified runnable distribution
        id: package_development
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && !(github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
        run: >-
          python ROOT_build/ci/build_runnable_distribution.py
          --repo .
          --commit "${{ github.sha }}"
          --output dist/releases

      - name: Build release-hardened runnable distribution
        id: package_release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
        run: >-
          python ROOT_build/ci/build_runnable_distribution.py
          --repo .
          --commit "${{ github.sha }}"
          --release-hardened
          --output dist/releases

      - name: Select package outputs
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ steps.package_release.outputs.distribution }}" ]]; then
            echo "distribution=${{ steps.package_release.outputs.distribution }}" >> "$GITHUB_OUTPUT"
            echo "archive=${{ steps.package_release.outputs.archive }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.package_release.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.package_release.outputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            echo "distribution=${{ steps.package_development.outputs.distribution }}" >> "$GITHUB_OUTPUT"
            echo "archive=${{ steps.package_development.outputs.archive }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.package_development.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.package_development.outputs.platform }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify distribution layout, hashes, entry points, Java 17 classfiles, and ZIP
        run: >-
          python ROOT_build/ci/verify_runnable_distribution.py
          "${{ steps.package.outputs.distribution }}"
          --archive "${{ steps.package.outputs.archive }}"
          --report "dist/releases/verification-${{ matrix.platform }}.json"

      - name: Run Gate 3 from staged client distribution
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.package.outputs.distribution }}'
          "$DIST/runtime/bin/java" -Djava.awt.headless=true \
            -cp "$DIST/packages/client/TheMechanist.jar:$DIST/packages/support/lib/*" \
            mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Run Gate 3 from staged client distribution
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.package.outputs.distribution }}'
          & "$dist/runtime/bin/java.exe" '-Djava.awt.headless=true' `
            -cp "$dist/packages/client/TheMechanist.jar;$dist/packages/support/lib/*" `
            mechanist.Gate3PlayerFacingTextSmokeSuite
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run staged headless server
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DIST='${{ steps.package.outputs.distribution }}'
          HOME="$RUNNER_TEMP/mechanist-staged-server" \
            "$DIST/runtime/bin/java" \
            -cp "$DIST/packages/server/TheMechanistServer.jar:$DIST/packages/support/lib/*" \
            mechanist.MechanistServerMain --help

      - name: Run staged headless server
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = '${{ steps.package.outputs.distribution }}'
          $env:USERPROFILE = "$env:RUNNER_TEMP/mechanist-staged-server"
          & "$dist/runtime/bin/java.exe" `
            -cp "$dist/packages/server/TheMechanistServer.jar;$dist/packages/support/lib/*" `
            mechanist.MechanistServerMain --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish verification summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Java 17 distribution gate — ${{ matrix.platform }}"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Version: \`${{ steps.package.outputs.version }}\`"
            echo "- Platform: \`${{ steps.package.outputs.platform }}\`"
            echo "- Gate 3: passed"
            echo "- Java 17 compile: passed"
            echo "- Client packaged smoke: passed"
            echo "- Server packaged smoke: passed"
            echo "- Distribution verifier: passed"
            echo "- Archive: \`$(basename '${{ steps.package.outputs.archive }}')\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runnable distribution and verification report
        uses: actions/upload-artifact@v4
        with:
          name: TheMechanist-${{ steps.package.outputs.version }}-${{ steps.package.outputs.platform }}
          path: |
            ${{ steps.package.outputs.archive }}
            dist/releases/verification-${{ matrix.platform }}.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish-release:
    name: Publish verified GitHub Release
    needs: verify-and-package
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download verified distributions
        uses: actions/download-artifact@v4
        with:
          pattern: TheMechanist-*
          path: release-assets
          merge-multiple: true

      - name: Resolve and validate release identity
        id: release
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$MANUAL_TAG"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+[A-Za-z0-9._-]*$ ]]; then
            echo "A manual release requires a valid v-prefixed release_tag such as v0.9.10iz." >&2
            exit 1
          fi
          ZIP_COUNT=$(find release-assets -type f -name '*.zip' | wc -l | tr -d ' ')
          REPORT_COUNT=$(find release-assets -type f -name 'verification-*.json' | wc -l | tr -d ' ')
          if [[ "$ZIP_COUNT" -lt 2 || "$REPORT_COUNT" -lt 2 ]]; then
            echo "Expected verified Linux and Windows ZIPs and reports; found ZIPs=$ZIP_COUNT reports=$REPORT_COUNT." >&2
            exit 1
          fi
          RELEASE_VERSION=$(python - <<'PY'
          import glob, json, os, sys
          reports = [json.load(open(path, encoding='utf-8')) for path in glob.glob('release-assets/**/verification-*.json', recursive=True)]
          versions = {str(report.get('version', '')) for report in reports}
          commits = {str(report.get('commit', '')) for report in reports}
          platforms = {str(report.get('platform', '')) for report in reports}
          if len(versions) != 1 or '' in versions:
              raise SystemExit(f'verification reports disagree on version: {sorted(versions)}')
          if commits != {os.environ['GITHUB_SHA']}:
              raise SystemExit(f'verification reports do not identify exact release commit: {sorted(commits)}')
          if not {'linux-x64', 'windows-x64'}.issubset(platforms):
              raise SystemExit(f'verification reports are missing required platforms: {sorted(platforms)}')
          print(next(iter(versions)))
          PY
          )
          if [[ "$TAG" != "v$RELEASE_VERSION" ]]; then
            echo "Release tag $TAG does not match verified artifact version v$RELEASE_VERSION." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -type f -name '*.zip' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find release-assets -maxdepth 2 -type f \( -name '*.zip' -o -name 'SHA256SUMS.txt' -o -name 'verification-*.json' \) | sort)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            EXTRA=()
            if [[ "$PRERELEASE" == "true" ]]; then EXTRA+=(--prerelease); fi
            gh release create "$TAG" "${ASSETS[@]}" \
              --target "${{ github.sha }}" \
              --title "The Mechanist $TAG" \
              --generate-notes \
              "${EXTRA[@]}"
          fi

      - name: Publish release summary
        shell: bash
        run: |
          {
            echo "## GitHub Release published"
            echo
            echo "- Tag: \`${{ steps.release.outputs.tag }}\`"
            echo "- Version: \`${{ steps.release.outputs.version }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Linux and Windows portable distributions: attached"
            echo "- SHA-256 checksums: attached"
            echo "- Java 17, Gate 3, packaged client/server, classfile, manifest, and ZIP gates: passed before publication"
          } >> "$GITHUB_STEP_SUMMARY"
