name: Native Installer Alpha Gate

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'config/proguard/**'
      - 'PACKAGE_client/**'
      - 'PACKAGE_launcher/**'
      - 'PACKAGE_installer/**'
      - 'ROOT_build/ci/**'
      - 'scripts/package/**'
      - '.github/workflows/native-installer-alpha-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'config/proguard/**'
      - 'PACKAGE_client/**'
      - 'PACKAGE_launcher/**'
      - 'PACKAGE_installer/**'
      - 'ROOT_build/ci/**'
      - 'scripts/package/**'
      - '.github/workflows/native-installer-alpha-gate.yml'
  workflow_dispatch:

concurrency:
  group: native-alpha-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  native-app-image:
    name: Native app image (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Record native toolchain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p native-gate-logs
          {
            java -version
            javac -version
            jpackage --version
            mvn -version
            python --version
            echo "commit=$GITHUB_SHA"
            echo "platform=${{ matrix.platform }}"
          } 2>&1 | tee native-gate-logs/toolchain-${{ matrix.platform }}.log

      - name: Verify release source policies
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q ROOT_build/ci
          python ROOT_build/ci/verify_proguard_configuration.py \
            --repo . \
            --report native-gate-logs/proguard-policy-${{ matrix.platform }}.json

      - name: Build hardened canonical distribution
        shell: bash
        run: |
          set -o pipefail
          python ROOT_build/ci/build_runnable_distribution.py \
            --repo . \
            --commit "$GITHUB_SHA" \
            --release-hardened \
            --output dist/native-gate-releases \
            2>&1 | tee native-gate-logs/canonical-build-${{ matrix.platform }}.log

      - name: Resolve canonical distribution
        id: canonical
        shell: bash
        run: |
          set -euo pipefail
          DIST=$(find dist/native-gate-releases -mindepth 1 -maxdepth 1 -type d -name 'TheMechanist-*-${{ matrix.platform }}' | head -n 1)
          ARCHIVE=$(find dist/native-gate-releases -maxdepth 1 -type f -name 'TheMechanist-*-${{ matrix.platform }}.zip' | head -n 1)
          test -n "$DIST"
          test -n "$ARCHIVE"
          echo "root=$DIST" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Verify canonical distribution
        shell: bash
        run: |
          set -o pipefail
          python ROOT_build/ci/verify_runnable_distribution.py \
            '${{ steps.canonical.outputs.root }}' \
            --archive '${{ steps.canonical.outputs.archive }}' \
            --require-release-hardened \
            --report 'dist/native-gate-releases/verification-${{ matrix.platform }}.json' \
            2>&1 | tee native-gate-logs/canonical-verify-${{ matrix.platform }}.log

      - name: Run packaged synthetic environment
        shell: bash
        run: |
          set -o pipefail
          python ROOT_build/ci/run_synthetic_distribution_tests.py \
            '${{ steps.canonical.outputs.root }}' \
            --verifier ROOT_build/ci/verify_runnable_distribution.py \
            --report 'dist/native-gate-releases/synthetic-${{ matrix.platform }}.json' \
            2>&1 | tee native-gate-logs/synthetic-${{ matrix.platform }}.log

      - name: Validate synthetic candidate contract
        shell: bash
        run: |
          python ROOT_build/ci/verify_synthetic_release_contract.py \
            'dist/native-gate-releases/synthetic-${{ matrix.platform }}.json' \
            --expected-platforms '${{ matrix.platform }}' \
            --require-release-hardened \
            --require-native-stage \
            --report 'native-gate-logs/synthetic-contract-${{ matrix.platform }}.json'

      - name: Build Linux native app image
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          ./scripts/package/build-linux-installers.sh \
            --distribution '${{ steps.canonical.outputs.root }}' \
            --package-types app-image \
            --output dist/native-gate-installers/linux \
            2>&1 | tee native-gate-logs/native-build-linux-x64.log

      - name: Build Windows native app image
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\package\build-windows-installers.ps1 `
            -DistributionRoot '${{ steps.canonical.outputs.root }}' `
            -PackageTypes app-image `
            -OutputDir 'dist\native-gate-installers\windows' `
            *>&1 | Tee-Object -FilePath 'native-gate-logs\native-build-windows-x64.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install Xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Launch Linux native image entry points
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE='dist/native-gate-installers/linux/app-image/The Mechanist'
          MAIN="$IMAGE/bin/The Mechanist"
          REMOTE="$IMAGE/bin/The Mechanist Remote Lobby"
          test -x "$MAIN"
          test -x "$REMOTE"
          PROFILE="$RUNNER_TEMP/Mechanist Native Image Profile"
          mkdir -p "$PROFILE"
          for EXE in "$MAIN" "$REMOTE"; do
            NAME=$(basename "$EXE" | tr ' ' '-')
            set +e
            HOME="$PROFILE" timeout 15s xvfb-run -a "$EXE" \
              >"native-gate-logs/native-launch-linux-x64-$NAME.stdout.log" \
              2>"native-gate-logs/native-launch-linux-x64-$NAME.stderr.log"
            CODE=$?
            set -e
            if [[ "$CODE" -ne 0 && "$CODE" -ne 124 ]]; then
              cat "native-gate-logs/native-launch-linux-x64-$NAME.stdout.log" || true
              cat "native-gate-logs/native-launch-linux-x64-$NAME.stderr.log" || true
              exit "$CODE"
            fi
          done

      - name: Launch Windows native image entry points
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $executables = @(
            'dist\native-gate-installers\windows\app-image\The Mechanist\The Mechanist.exe',
            'dist\native-gate-installers\windows\app-image\The Mechanist\The Mechanist Remote Lobby.exe'
          )
          $profile = "$env:RUNNER_TEMP\Mechanist Native Image Profile"
          New-Item -ItemType Directory -Force -Path $profile | Out-Null
          $env:USERPROFILE = $profile
          $env:APPDATA = "$profile\AppData\Roaming"
          $env:LOCALAPPDATA = "$profile\AppData\Local"
          foreach ($exe in $executables) {
            if (-not (Test-Path -LiteralPath $exe -PathType Leaf)) {
              throw "Missing native image executable: $exe"
            }
            $process = Start-Process -FilePath $exe -PassThru -WorkingDirectory $env:RUNNER_TEMP
            Start-Sleep -Seconds 12
            if ($process.HasExited -and $process.ExitCode -ne 0) { exit $process.ExitCode }
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

      - name: Verify required native reports
        shell: bash
        run: |
          set -euo pipefail
          if [[ '${{ matrix.platform }}' == 'linux-x64' ]]; then
            ROOT='dist/native-gate-installers/linux'
          else
            ROOT='dist/native-gate-installers/windows'
          fi
          test -f "$ROOT/source-verification-${{ matrix.platform }}.json"
          test -f "$ROOT/staging-${{ matrix.platform }}.json"
          test -f "$ROOT/native-image-verification-${{ matrix.platform }}.json"
          test -f "$ROOT/SHA256SUMS.txt"
          python - <<PY
          import json
          root=r'''$ROOT'''
          report=json.load(open(root+'/native-image-verification-${{ matrix.platform }}.json',encoding='utf-8'))
          assert report['status']=='verified'
          assert report['platform']=='${{ matrix.platform }}'
          assert report['releaseHardened'] is True
          assert report['remoteLobbyNativeExecutable'] is True
          assert report['remoteLobbyEntryPoint']=='mechanist.RemoteClientMain'
          assert report['authenticatedWaitAuthority'] is True
          assert report['waitCommand']=='WAIT'
          assert report['movementAuthority'] is False
          assert report['mapAuthority'] is False
          assert report['fullRemoteWorldAuthority'] is False
          assert report['remoteGameplayCertified'] is False
          assert report['installerSourceVerificationSchema']==3
          assert report['mutableStorageIncluded'] is False
          synthetic=json.load(open('dist/native-gate-releases/synthetic-${{ matrix.platform }}.json',encoding='utf-8'))
          assert synthetic['status']=='passed'
          assert synthetic['authenticatedWaitAuthority'] if 'authenticatedWaitAuthority' in synthetic else synthetic['independentHostAuthenticatedWaitControl']
          assert synthetic['independentHostMovementAuthority'] is False
          assert synthetic['independentHostMapAuthority'] is False
          assert synthetic['independentHostFullWorldAuthority'] is False
          assert synthetic['independentHostGameplaySessionCertified'] is False
          assert synthetic['nativeInstallerPayloadStageRequired'] is True
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Native-Alpha-${{ matrix.platform }}
          path: |
            dist/native-gate-installers/**
            dist/native-gate-releases/verification-${{ matrix.platform }}.json
            dist/native-gate-releases/synthetic-${{ matrix.platform }}.json
            native-gate-logs/**
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
