name: One Shot Runtime Item Object Assets

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-runtime-item-object-assets.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Reconcile item and object hints with the active registry
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python - <<'PY'
          from pathlib import Path

          item = Path('src/mechanist/ItemSemanticAssetAuthority.java')
          text = item.read_text(encoding='utf-8')
          old = '''import mechanist.assets.AssetMetadata;
          '''
          new = '''import mechanist.assets.AssetMetadata;
          import mechanist.assets.AssetType;
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one item AssetMetadata import, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''    static Optional<AssetMetadata> metadataForItemName(String rawName) {
                  return AssetManager.metadata(semanticAssetIdForItemName(rawName));
              }
          '''
          new = '''    static Optional<String> runtimeAssetIdForItemName(String rawName) {
                  String hint = semanticAssetIdForItemName(rawName);
                  String semanticName = normalizedItemName(rawName);
                  return SemanticAssetHintResolver.resolve(hint, semanticName, java.util.Set.of(
                          AssetType.ITEM_ICON, AssetType.WEAPON_ICON, AssetType.ARMOR_ICON,
                          AssetType.OBJECT, AssetType.FIXTURE, AssetType.MACHINE));
              }

              static Optional<AssetMetadata> metadataForItemName(String rawName) {
                  return runtimeAssetIdForItemName(rawName).flatMap(AssetManager::metadata);
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one item metadata block, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''    static String semanticSummaryForItemName(String rawName) {
                  String id = semanticAssetIdForItemName(rawName);
                  Optional<AssetMetadata> meta = AssetManager.metadata(id);
                  if (meta.isEmpty()) return "Semantic asset: " + id + " (registry metadata unavailable).";
                  AssetMetadata m = meta.get();
                  return "Semantic asset: " + m.id() + " / " + m.type().displayName() + " / " + m.name() + ".";
              }
          '''
          new = '''    static String semanticSummaryForItemName(String rawName) {
                  String hint = semanticAssetIdForItemName(rawName);
                  Optional<AssetMetadata> meta = metadataForItemName(rawName);
                  if (meta.isEmpty()) return "Semantic asset hint: " + hint + " (no compatible active-registry asset).";
                  AssetMetadata m = meta.get();
                  return "Semantic asset: " + m.id() + " / " + m.type().displayName() + " / " + m.name()
                          + " / authoredHint=" + hint + ".";
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one item semantic summary block, found {text.count(old)}')
          item.write_text(text.replace(old, new), encoding='utf-8')

          obj = Path('src/mechanist/ObjectSemanticAssetAuthority.java')
          text = obj.read_text(encoding='utf-8')

          old = '''    static String assetIdForBaseObject(BaseObject object) {
                  return assetIdForName(object == null ? null : object.name);
              }

              static BufferedImage imageForBaseObject(BaseObject object) {
                  return imageForAssetId(assetIdForBaseObject(object));
              }
          '''
          new = '''    static String assetIdForBaseObject(BaseObject object) {
                  return assetIdForName(object == null ? null : object.name);
              }

              static Optional<String> runtimeAssetIdForBaseObject(BaseObject object) {
                  String name = object == null ? "" : object.name;
                  return SemanticAssetHintResolver.resolve(assetIdForBaseObject(object), name, java.util.Set.of(
                          AssetType.OBJECT, AssetType.FIXTURE, AssetType.MACHINE,
                          AssetType.ITEM_ICON, AssetType.WALL_TILE));
              }

              static BufferedImage imageForBaseObject(BaseObject object) {
                  String id = runtimeAssetIdForBaseObject(object).orElse(assetIdForBaseObject(object));
                  return imageForAssetId(id);
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one base object block, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''    static String assetIdForMapObject(MapObjectState object) {
                  if (object == null) return "ITEM-G01";
                  String label = object.label == null ? "" : object.label;
                  String type = object.type == null ? "" : object.type;
                  String stock = object.stockState == null ? "" : object.stockState;
                  String id = assetIdForName(label);
                  if (!"ITEM-G01".equals(id)) return id;
                  id = assetIdForName(type);
                  if (!"ITEM-G01".equals(id)) return id;
                  return assetIdForName(stock);
              }

              static BufferedImage imageForMapObject(MapObjectState object) {
                  return imageForAssetId(assetIdForMapObject(object));
              }
          '''
          new = '''    static String assetIdForMapObject(MapObjectState object) {
                  if (object == null) return "ITEM-G01";
                  String label = object.label == null ? "" : object.label;
                  String type = object.type == null ? "" : object.type;
                  String stock = object.stockState == null ? "" : object.stockState;
                  String id = assetIdForName(label);
                  if (!"ITEM-G01".equals(id)) return id;
                  id = assetIdForName(type);
                  if (!"ITEM-G01".equals(id)) return id;
                  return assetIdForName(stock);
              }

              static Optional<String> runtimeAssetIdForMapObject(MapObjectState object) {
                  if (object == null) return Optional.empty();
                  String semantic = (object.label == null ? "" : object.label) + " "
                          + (object.type == null ? "" : object.type) + " "
                          + (object.stockState == null ? "" : object.stockState);
                  return SemanticAssetHintResolver.resolve(assetIdForMapObject(object), semantic, java.util.Set.of(
                          AssetType.OBJECT, AssetType.FIXTURE, AssetType.MACHINE,
                          AssetType.ITEM_ICON, AssetType.WEAPON_ICON, AssetType.ARMOR_ICON));
              }

              static BufferedImage imageForMapObject(MapObjectState object) {
                  String id = runtimeAssetIdForMapObject(object).orElse(assetIdForMapObject(object));
                  return imageForAssetId(id);
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one map object block, found {text.count(old)}')
          obj.write_text(text.replace(old, new), encoding='utf-8')

          legacy = Path('src/mechanist/LegacyPanelContext.java')
          text = legacy.read_text(encoding='utf-8')

          old = '''    BufferedImage getMapObjectImage(MapObjectState object) {
                  ensureLoaded(lastOptions);
                  String id = ObjectSemanticAssetAuthority.assetIdForMapObject(object);
                  BufferedImage img = media.getSemanticAssetImage(id);
                  return img != null ? img : ObjectSemanticAssetAuthority.imageForAssetId(id);
              }

              BufferedImage getBaseObjectImage(BaseObject object) {
                  ensureLoaded(lastOptions);
                  String id = ObjectSemanticAssetAuthority.assetIdForBaseObject(object);
                  BufferedImage img = media.getSemanticAssetImage(id);
                  return img != null ? img : ObjectSemanticAssetAuthority.imageForAssetId(id);
              }
          '''
          new = '''    BufferedImage getMapObjectImage(MapObjectState object) {
                  ensureLoaded(lastOptions);
                  String hint = ObjectSemanticAssetAuthority.assetIdForMapObject(object);
                  String id = ObjectSemanticAssetAuthority.runtimeAssetIdForMapObject(object).orElse(hint);
                  BufferedImage img = media.getSemanticAssetImage(id);
                  return img != null ? img : ObjectSemanticAssetAuthority.imageForAssetId(id);
              }

              BufferedImage getBaseObjectImage(BaseObject object) {
                  ensureLoaded(lastOptions);
                  String hint = ObjectSemanticAssetAuthority.assetIdForBaseObject(object);
                  String id = ObjectSemanticAssetAuthority.runtimeAssetIdForBaseObject(object).orElse(hint);
                  BufferedImage img = media.getSemanticAssetImage(id);
                  return img != null ? img : ObjectSemanticAssetAuthority.imageForAssetId(id);
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one legacy object image block, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''    BufferedImage getItemIcon(String itemName) {
                  ensureLoaded(lastOptions);
                  return media.getItemIcon(itemName);
              }
          '''
          new = '''    BufferedImage getItemIcon(String itemName) {
                  ensureLoaded(lastOptions);
                  Optional<String> runtimeId = ItemSemanticAssetAuthority.runtimeAssetIdForItemName(itemName);
                  if (runtimeId.isPresent()) {
                      BufferedImage semantic = media.getSemanticAssetImage(runtimeId.get());
                      if (semantic != null) return semantic;
                  }
                  return media.getItemIcon(itemName);
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one legacy item icon block, found {text.count(old)}')
          legacy.write_text(text.replace(old, new), encoding='utf-8')

          smoke = Path('src/mechanist/RuntimeSemanticAssetHintSmoke.java')
          smoke.write_text('''package mechanist;

          import mechanist.assets.AssetManager;

          import java.util.List;

          public final class RuntimeSemanticAssetHintSmoke {
              public static void main(String[] args) {
                  if (AssetManager.registry().size() == 0) {
                      throw new AssertionError("active semantic asset registry was empty");
                  }
                  int resolved = 0;
                  for (String name : List.of("combat knife", "shotgun", "guard cot", "water barrel",
                          "newspaper", "generator", "storage crate", "security sensor mast")) {
                      var id = ItemSemanticAssetAuthority.runtimeAssetIdForItemName(name);
                      if (id.isPresent()) {
                          resolved++;
                          if (AssetManager.metadata(id.get()).isEmpty()) {
                              throw new AssertionError("runtime item resolution escaped registry: " + name + " -> " + id.get());
                          }
                      }
                  }
                  if (resolved == 0) throw new AssertionError("no representative item hint resolved into the active registry");
                  System.out.println("RuntimeSemanticAssetHintSmoke PASS registry="
                          + AssetManager.registry().size() + " representativeResolved=" + resolved
                          + " resolver=" + SemanticAssetHintResolver.VERSION);
              }

              private RuntimeSemanticAssetHintSmoke() {}
          }
          ''', encoding='utf-8')
          PY

      - name: Compile and run semantic registry smokes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/runtime-item-object-assets
          mkdir -p ROOT_build/runtime-item-object-assets/classes
          find src -name '*.java' -print > ROOT_build/runtime-item-object-assets/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/runtime-item-object-assets/classes @ROOT_build/runtime-item-object-assets/sources.txt
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/runtime-item-object-assets/classes mechanist.RuntimeSemanticAssetHintSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/runtime-item-object-assets/classes mechanist.TileSemanticRuntimeRegistrySmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/runtime-item-object-assets/classes mechanist.Milestone02SemanticAssetMigrationCoverageSmoke

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-runtime-item-object-assets.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/ItemSemanticAssetAuthority.java src/mechanist/ObjectSemanticAssetAuthority.java src/mechanist/LegacyPanelContext.java src/mechanist/RuntimeSemanticAssetHintSmoke.java .github/workflows/one-shot-runtime-item-object-assets.yml
          git commit -m 'Resolve item and object assets through the active registry'
          git push origin HEAD:main
