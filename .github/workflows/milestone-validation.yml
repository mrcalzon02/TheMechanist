name: Milestone Validation and Smoke

run-name: Milestone validation for ${{ github.ref_name }} at ${{ github.sha }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      validation_note:
        description: Optional note for the manual validation run
        required: false
        default: manual milestone validation

permissions:
  contents: read

env:
  VALIDATION_PROFILE: milestone-validation-reactivated-2026-06-05

jobs:
  validate:
    name: Java 17 compile, smoke tests, and package seed
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Announce validation profile
        shell: pwsh
        run: |
          Write-Host "Validation profile: $env:VALIDATION_PROFILE"
          Write-Host "Manual note: ${{ github.event.inputs.validation_note }}"
          Write-Host "Repository: ${{ github.repository }}"
          Write-Host "Ref: ${{ github.ref }}"

      - name: Compile main source tree
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "build\ci\classes" | Out-Null
          $sources = @(Get-ChildItem -LiteralPath "src" -Recurse -File -Filter "*.java")
          if (-not $sources -or $sources.Count -eq 0) { throw "No Java sources found under src" }
          $sources | ForEach-Object { '"' + ($_.FullName -replace '\\','/') + '"' } | Set-Content -LiteralPath "build\ci\sources.arg" -Encoding ASCII
          javac --release 17 -d "build\ci\classes" "@build\ci\sources.arg"

      - name: Run player-facing and milestone smoke tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $classes = "build\ci\classes"
          $smokes = @(
            "mechanist.Gate3PlayerFacingTextSmokeSuite",
            "mechanist.SimulationToolSuiteRecoverySmoke",
            "mechanist.LightingFalloffStreetLightSmoke",
            "mechanist.RoadTemplateRulesSmoke"
          )
          foreach ($smoke in $smokes) {
            Write-Host "Running $smoke"
            java -cp $classes $smoke
          }

      - name: Stage local package seed and scan Java 17 classfiles
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "ROOT_tools\packaging\stage_local_package_seed.ps1" -Version "ci-milestone-validation"

      - name: Write validation summary
        if: always()
        shell: pwsh
        run: |
          "## Milestone validation" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- Profile: $env:VALIDATION_PROFILE" >> $env:GITHUB_STEP_SUMMARY
          "- Java: Temurin 17" >> $env:GITHUB_STEP_SUMMARY
          "- Compile target: src -> build/ci/classes" >> $env:GITHUB_STEP_SUMMARY
          "- Smoke entry point: mechanist.Gate3PlayerFacingTextSmokeSuite" >> $env:GITHUB_STEP_SUMMARY
          "- Package seed path: ROOT_tools/packaging/stage_local_package_seed.ps1" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload local package seed manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-package-seed-manifests
          path: build/local-package-seed/manifests
          if-no-files-found: ignore
