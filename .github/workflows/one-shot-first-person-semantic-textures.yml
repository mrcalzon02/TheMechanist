name: One Shot First Person Semantic Textures

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-first-person-semantic-textures.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Route first-person floors and walls through semantic tile assets
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python - <<'PY'
          from pathlib import Path

          legacy = Path('src/mechanist/LegacyPanelContext.java')
          text = legacy.read_text(encoding='utf-8')
          old = '''    BufferedImage getSemanticAssetImage(String assetId) {
                  ensureLoaded(lastOptions);
                  return media.getSemanticAssetImage(assetId);
              }
          '''
          new = '''    BufferedImage getSemanticAssetImage(String assetId) {
                  ensureLoaded(lastOptions);
                  return media.getSemanticAssetImage(assetId);
              }

              BufferedImage getCompiledTileImage(World world, int worldX, int worldY,
                                                 char fallbackGlyph, boolean preferUnderlay) {
                  ensureLoaded(lastOptions);
                  CompiledTileDescriptor descriptor = TileDataCompilationAuthority.resolve(
                          world, worldX, worldY, fallbackGlyph);
                  if (descriptor == null) return media.tileArt.getRegistry().getTile(fallbackGlyph);

                  String artKey;
                  String assetId;
                  char glyph = fallbackGlyph;
                  if (preferUnderlay && descriptor.hasOverlay()) {
                      artKey = descriptor.underlayArtKey;
                      assetId = descriptor.underlayAssetId;
                      glyph = descriptor.underlayGlyph == null ? '.' : descriptor.underlayGlyph.charValue();
                  } else if (descriptor.hasOverlay()) {
                      artKey = descriptor.overlayArtKey;
                      assetId = AssetAuditDevRoomAuthority.assetIdFor(world, worldX, worldY, descriptor);
                  } else {
                      artKey = descriptor.primaryArtKey;
                      assetId = AssetAuditDevRoomAuthority.assetIdFor(world, worldX, worldY, descriptor);
                  }

                  BufferedImage image = assetId == null ? null : media.getSemanticAssetImage(assetId);
                  if (image == null && artKey != null) image = media.getTile(artKey, glyph);
                  if (image == null) image = media.tileArt.getRegistry().getTile(glyph);
                  return image;
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one LegacyImageSurface semantic accessor block, found {text.count(old)}')
          legacy.write_text(text.replace(old, new), encoding='utf-8')

          first = Path('src/mechanist/FirstPerson3DFramework.java')
          text = first.read_text(encoding='utf-8')

          old = '''    private final ArrayList<RenderableSprite> spriteScratch = new ArrayList<>(256);
              private BufferedImage frame;
          '''
          new = '''    private final ArrayList<RenderableSprite> spriteScratch = new ArrayList<>(256);
              private final java.util.HashMap<Long, BufferedImage> firstPersonFloorTextureCache = new java.util.HashMap<>();
              private final java.util.HashMap<Long, BufferedImage> firstPersonWallTextureCache = new java.util.HashMap<>();
              private BufferedImage frame;
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one first-person field block, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''    private void rasterizeWorld(GamePanel panel, int w, int h, long now) {
                  World world = panel.world;
                  int horizon = h / 2 + (int)(camera.pitchRadians() * h * 0.55);
          '''
          new = '''    private void rasterizeWorld(GamePanel panel, int w, int h, long now) {
                  World world = panel.world;
                  firstPersonFloorTextureCache.clear();
                  firstPersonWallTextureCache.clear();
                  int horizon = h / 2 + (int)(camera.pitchRadians() * h * 0.55);
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one rasterizeWorld header, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''            double light = lightDecay.brightness(camera.x(), camera.z(), hit.impactX(), hit.impactZ(), panel, now);
                      int color = tileBaseColor(hit.tile(), hit.kind(), hit.side(), hit.tileX(), hit.tileY());
                      if (hasWallLightAt(hit.tileX(), hit.tileY())) color = wallLightOverlayColor(color, sx, y0, y1);
                      color = applyBrightness(color, light);
                      if (hit.side() == 1) color = darken(color, 0.78);
                      float fogDistance = (float)(radialFog ? hit.distance() : dist);
                      color = fog.applyFogArgb(color, fogSettings, fogDistance);
                      for (int y = y0; y <= y1; y++) {
                          int stripe = (((y - y0) / 6) + sx / 9) & 1;
                          pixels[y * w + sx] = stripe == 0 ? color : darken(color, 0.88);
                      }
          '''
          new = '''            double wallU = hit.side() == 0
                              ? hit.impactZ() - Math.floor(hit.impactZ())
                              : hit.impactX() - Math.floor(hit.impactX());
                      BufferedImage wallTexture = firstPersonTileTexture(
                              panel, world, hit.tileX(), hit.tileY(), hit.tile(), true);
                      double light = lightDecay.brightness(camera.x(), camera.z(), hit.impactX(), hit.impactZ(), panel, now);
                      int baseColor = tileBaseColor(hit.tile(), hit.kind(), hit.side(), hit.tileX(), hit.tileY());
                      if (hasWallLightAt(hit.tileX(), hit.tileY())) baseColor = wallLightOverlayColor(baseColor, sx, y0, y1);
                      float fogDistance = (float)(radialFog ? hit.distance() : dist);
                      for (int y = y0; y <= y1; y++) {
                          double wallV = (y - y0) / Math.max(1.0, y1 - y0 + 1.0);
                          int color = sampleImageArgb(wallTexture, wallU, wallV, baseColor);
                          color = applyBrightness(color, light);
                          if (hit.side() == 1) color = darken(color, 0.78);
                          color = fog.applyFogArgb(color, fogSettings, fogDistance);
                          int stripe = (((y - y0) / 6) + sx / 9) & 1;
                          pixels[y * w + sx] = stripe == 0 ? color : darken(color, 0.94);
                      }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one first-person wall shading block, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''                        char tile = world.tiles[tx][ty];
                                  BufferedImage tex = panel.images.getTile(tile);
                                  color = sampleImageArgb(tex, u, v, tile == '#' ? 0xFF2D2923 : 0xFF171613);
          '''
          new = '''                        char tile = world.tiles[tx][ty];
                                  BufferedImage tex = firstPersonTileTexture(panel, world, tx, ty, tile, false);
                                  color = sampleImageArgb(tex, u, v, tile == '#' ? 0xFF2D2923 : 0xFF171613);
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one first-person floor texture block, found {text.count(old)}')
          text = text.replace(old, new)

          old = '''    private int sampleImageArgb(BufferedImage img, double u, double v, int fallback) {
                  if (img == null || img.getWidth() <= 0 || img.getHeight() <= 0) return fallback;
                  int ix = Math.floorMod((int)Math.floor(u * img.getWidth()), img.getWidth());
                  int iy = Math.floorMod((int)Math.floor(v * img.getHeight()), img.getHeight());
                  int argb = img.getRGB(ix, iy);
                  int a = (argb >>> 24) & 255;
                  if (a < 24) return fallback;
                  return 0xFF000000 | (argb & 0x00FFFFFF);
              }
          '''
          new = '''    private int sampleImageArgb(BufferedImage img, double u, double v, int fallback) {
                  if (img == null || img.getWidth() <= 0 || img.getHeight() <= 0) return fallback;
                  int ix = Math.floorMod((int)Math.floor(u * img.getWidth()), img.getWidth());
                  int iy = Math.floorMod((int)Math.floor(v * img.getHeight()), img.getHeight());
                  int argb = img.getRGB(ix, iy);
                  int a = (argb >>> 24) & 255;
                  if (a < 24) return fallback;
                  return 0xFF000000 | (argb & 0x00FFFFFF);
              }

              private BufferedImage firstPersonTileTexture(GamePanel panel, World world, int tileX, int tileY,
                                                           char fallbackGlyph, boolean wallSurface) {
                  if (panel == null || panel.images == null || world == null || !world.inBounds(tileX, tileY)) return null;
                  java.util.HashMap<Long, BufferedImage> cache = wallSurface
                          ? firstPersonWallTextureCache : firstPersonFloorTextureCache;
                  long key = (((long) tileX) << 32) ^ (tileY & 0xffffffffL);
                  if (cache.containsKey(key)) return cache.get(key);
                  BufferedImage image = panel.images.getCompiledTileImage(
                          world, tileX, tileY, fallbackGlyph, !wallSurface);
                  cache.put(key, image);
                  return image;
              }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one sampleImageArgb block, found {text.count(old)}')
          first.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Compile and run semantic migration smokes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/first-person-semantic-textures
          mkdir -p ROOT_build/first-person-semantic-textures/classes
          find src -name '*.java' -print > ROOT_build/first-person-semantic-textures/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/first-person-semantic-textures/classes @ROOT_build/first-person-semantic-textures/sources.txt
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/first-person-semantic-textures/classes mechanist.TileSemanticRuntimeRegistrySmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/first-person-semantic-textures/classes mechanist.Milestone02SemanticAssetMigrationCoverageSmoke

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-first-person-semantic-textures.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/LegacyPanelContext.java src/mechanist/FirstPerson3DFramework.java .github/workflows/one-shot-first-person-semantic-textures.yml
          git commit -m 'Route first-person rendering through semantic tile assets'
          git push origin HEAD:main
