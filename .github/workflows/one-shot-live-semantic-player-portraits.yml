name: One Shot Direct Player Portrait Boundary Migration

on:
  workflow_run:
    workflows: ["Inspect Legacy Image Surface"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: one-shot-live-semantic-player-portraits
  cancel-in-progress: false

jobs:
  migrate:
    if: github.event.workflow_run.id == 27512874051 && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Patch and verify the player portrait boundary
        id: verify
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            git pull --ff-only origin main
            python - <<'PY'
          from pathlib import Path

          path = Path('src/mechanist/MediaRuntimeFramework.java')
          text = path.read_text(encoding='utf-8')
          old = '''    BufferedImage getPortrait(int sheetIndex, int portraitIndex) {
                  // PLAYER CHARACTER/PROFILE DEFAULTS ARE LOCKED TO THE PLAYER-HUMAN POOL ONLY.
                  // Never fall through into NPC faction buckets or name_locked celebrity portraits.
                  if (!playerHumanPortraitCells.isEmpty()) return playerHumanPortraitCells.get(Math.floorMod(portraitIndex, playerHumanPortraitCells.size()));
                  BufferedImage legacy = getLegacyPlayerHumanPortrait(portraitIndex);
                  if (legacy != null) return legacy;
                  return generatedPlayerHumanFallbackPortrait(portraitIndex);
              }
          '''
          new = '''    BufferedImage getPortrait(int sheetIndex, int portraitIndex) {
                  // The persistent portrait index resolves through the active semantic registry first.
                  // The existing player-human cells, baseline sheet, and generated portrait remain
                  // compatibility fallbacks. NPC and name-locked partitions are never consulted here.
                  Optional<String> semanticId = PortraitSemanticIdentityResolver.playerAssetId(
                          Path.of("."), AssetManager.registry(), portraitIndex);
                  if (semanticId.isPresent()) {
                      BufferedImage semantic = getSemanticAssetImage(semanticId.get());
                      if (semantic != null) return semantic;
                  }
                  if (!playerHumanPortraitCells.isEmpty()) return playerHumanPortraitCells.get(Math.floorMod(portraitIndex, playerHumanPortraitCells.size()));
                  BufferedImage legacy = getLegacyPlayerHumanPortrait(portraitIndex);
                  if (legacy != null) return legacy;
                  return generatedPlayerHumanFallbackPortrait(portraitIndex);
              }
          '''
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one legacy player portrait boundary.')
          text = text.replace(old, new)
          if text.count('PortraitSemanticIdentityResolver.playerAssetId(') != 1:
              raise SystemExit('Semantic player portrait boundary count is incorrect.')
          if 'return generatedPlayerHumanFallbackPortrait(portraitIndex);' not in text:
              raise SystemExit('Generated portrait compatibility fallback was lost.')
          path.write_text(text, encoding='utf-8')
          PY

            rm -rf ROOT_build/live-semantic-player-portraits
            mkdir -p ROOT_build/live-semantic-player-portraits/classes
            find src -name '*.java' -print > ROOT_build/live-semantic-player-portraits/sources.txt
            javac -encoding UTF-8 --release 17 -d ROOT_build/live-semantic-player-portraits/classes @ROOT_build/live-semantic-player-portraits/sources.txt
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.PortraitSemanticRuntimeSmoke
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Milestone02SemanticCompiledIndexBoundarySmoke
            java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Gate3PlayerFacingTextSmokeSuite
          } > /tmp/live-semantic-player-portraits.log 2>&1
          status=$?
          cat /tmp/live-semantic-player-portraits.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit verified player portrait migration
        if: steps.verify.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          history = Path('ROOT_docs/DEVELOPMENT_HISTORY.md')
          heading = '## Milestone 02 - Live Semantic Player Portrait Rendering'
          text = history.read_text(encoding='utf-8') if history.exists() else ''
          if heading not in text:
              text = text.rstrip() + '''

## Milestone 02 - Live Semantic Player Portrait Rendering

The shared player-portrait boundary now resolves the persistent portrait index through the active semantic registry before retaining the established path-sorted player-human cells, baseline portrait sheet, and generated portrait as compatibility fallbacks. NPC, animal, restricted-family, and name-locked portrait routing remain under the existing identity-aware NPC authority pending their separately verified migration.

Verification completed with a full Java 17 UTF-8 compilation, portrait semantic runtime checks, semantic migration coverage, compiled-index boundary checks, and Gate 3.
'''
              history.write_text(text, encoding='utf-8')
          PY
          rm -rf ROOT_build/live-semantic-player-portraits
          rm -f ROOT_docs/.noop ROOT_docs/LIVE_SEMANTIC_PLAYER_PORTRAIT_MIGRATION_FAILURE.md
          rm -f .github/workflows/one-shot-live-semantic-player-portraits.yml
          rm -f .github/workflows/one-shot-live-semantic-player-portraits-scheduled.yml
          rm -f .github/workflows/one-shot-live-semantic-player-portraits-terminal.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Route live player portraits through semantic identity resolution'
          git push origin HEAD:main

      - name: Record verification failure without source changes
        if: steps.verify.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- src/mechanist/MediaRuntimeFramework.java
          {
            echo '# Live Semantic Player Portrait Migration Failure'
            echo
            echo 'The source edit was discarded because verification did not pass.'
            echo
            echo '```text'
            tail -n 220 /tmp/live-semantic-player-portraits.log
            echo '```'
          } > ROOT_docs/LIVE_SEMANTIC_PLAYER_PORTRAIT_MIGRATION_FAILURE.md
          rm -rf ROOT_build/live-semantic-player-portraits
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ROOT_docs/LIVE_SEMANTIC_PLAYER_PORTRAIT_MIGRATION_FAILURE.md
          git commit -m 'Record live semantic player portrait migration failure'
          git push origin HEAD:main
