name: One Shot Live Semantic Player Portraits

on:
  workflow_run:
    workflows: ["Inspect Legacy Image Surface"]
    types: [completed]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.workflow_run.id == 27512874051
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Patch the three verified live player portrait calls
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python - <<'PY'
          from pathlib import Path

          path = Path('src/mechanist/LegacyPanelContext.java')
          text = path.read_text(encoding='utf-8')
          active_call = 'images.getPlayerPortrait(active)'
          overview_call = 'images.getPlayerPortrait(c)'
          all_count = text.count('images.getPlayerPortrait(')
          active_count = text.count(active_call)
          overview_count = text.count(overview_call)
          print(f'before total={all_count} active={active_count} overview={overview_count}')
          if (all_count, active_count, overview_count) != (3, 2, 1):
              raise SystemExit('Live portrait call inventory changed; refusing automatic migration.')
          text = text.replace(active_call, 'PortraitSemanticRuntimeBridge.playerPortrait(images, active)')
          text = text.replace(overview_call, 'PortraitSemanticRuntimeBridge.playerPortrait(images, c)')
          if 'images.getPlayerPortrait(' in text:
              raise SystemExit('A direct live player portrait call remains after replacement.')
          if text.count('PortraitSemanticRuntimeBridge.playerPortrait(images, active)') != 2:
              raise SystemExit('Expected two active-player semantic bridge calls.')
          if text.count('PortraitSemanticRuntimeBridge.playerPortrait(images, c)') != 1:
              raise SystemExit('Expected one character-overview semantic bridge call.')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Compile Java 17 and run semantic verification
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/live-semantic-player-portraits
          mkdir -p ROOT_build/live-semantic-player-portraits/classes
          find src -name '*.java' -print > ROOT_build/live-semantic-player-portraits/sources.txt
          javac -encoding UTF-8 --release 17 -d ROOT_build/live-semantic-player-portraits/classes @ROOT_build/live-semantic-player-portraits/sources.txt
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.PortraitSemanticRuntimeSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Milestone02SemanticCompiledIndexBoundarySmoke
          java -Djava.awt.headless=true -Dmechanist.assetRoot="$PWD" -cp ROOT_build/live-semantic-player-portraits/classes mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Record and commit the verified migration on main
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          history = Path('ROOT_docs/DEVELOPMENT_HISTORY.md')
          heading = '## Milestone 02 - Live Semantic Player Portrait Rendering'
          if history.exists():
              text = history.read_text(encoding='utf-8')
              if heading not in text:
                  text = text.rstrip() + '''

## Milestone 02 - Live Semantic Player Portrait Rendering

The moving player sprite, movement-plan destination preview, and character overview now resolve the persistent portrait index through the active semantic registry before using the established portrait-sheet loader as a compatibility fallback. The resolver preserves path-sorted Humans8x8 cell ordering and legacy modulo behavior, including overflow and negative indices. NPC portrait routing remains under the established identity-aware loader pending a separately verified restricted-family migration.

Verification completed with a full Java 17 UTF-8 compilation, the portrait semantic runtime smoke, semantic migration coverage, compiled-index boundary checks, and Gate 3.
'''
                  history.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/one-shot-live-semantic-player-portraits.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/LegacyPanelContext.java ROOT_docs/DEVELOPMENT_HISTORY.md .github/workflows/one-shot-live-semantic-player-portraits.yml
          git commit -m 'Route live player portraits through semantic identity resolution'
          git push origin HEAD:main
