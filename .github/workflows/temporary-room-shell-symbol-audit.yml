name: Temporary Room Shell Symbol Audit

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/temporary-room-shell-symbol-audit.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  patch-room-shell-symbols:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply exact canonical-owner substitutions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/mechanist/FactionRoomShellConstructionAuthority.java')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('World.isTransitionTile', 'BoundedOuterHiveWallApi.isTransitionTile', 3),
              ('World.HIVEWALL_CORRIDOR', 'BoundedOuterHiveWallApi.HIVEWALL_CORRIDOR', 2),
          ]
          for old, new, expected in replacements:
              actual = text.count(old)
              if actual != expected:
                  raise SystemExit(f'Expected {expected} occurrences of {old!r}, found {actual}.')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          changed=$(git diff --numstat -- src/mechanist/FactionRoomShellConstructionAuthority.java)
          test "$changed" = $'5\t5\tsrc/mechanist/FactionRoomShellConstructionAuthority.java'
      - name: Commit exact source repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/FactionRoomShellConstructionAuthority.java
          git commit -m 'Use canonical room shell transition APIs'
          git push origin HEAD:main
      - name: Record patch audit on issue 46
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 46,
              body: [
                '## Canonical room-shell symbol repair dispatched',
                '',
                `Workflow commit: \`${context.sha}\``,
                '',
                '- Replaced three invalid `World.isTransitionTile` references with `BoundedOuterHiveWallApi.isTransitionTile`.',
                '- Replaced two invalid `World.HIVEWALL_CORRIDOR` references with `BoundedOuterHiveWallApi.HIVEWALL_CORRIDOR`.',
                '- The patcher required an exact `5 additions / 5 deletions` source diff before committing.'
              ].join('\n')
            });
