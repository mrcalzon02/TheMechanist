name: Temporary Direct Java 17 Milestone Verification

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/temporary-room-shell-symbol-audit.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  verify-current-main:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run exact milestone gate and retain first failure
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p ROOT_build/direct-main-java17
          log='ROOT_build/direct-main-java17/full.log'
          tail_file='ROOT_build/direct-main-java17/tail.log'
          : > "$log"
          failed=''
          failure_code=0

          run_stage() {
            local label="$1"
            shift
            echo "=== $label ===" | tee -a "$log"
            "$@" >>"$log" 2>&1
            local code=$?
            if [ "$code" -ne 0 ]; then
              failed="$label"
              failure_code="$code"
              echo "FAILED stage=$label code=$code" | tee -a "$log"
              return 1
            fi
            echo "PASSED stage=$label" | tee -a "$log"
            return 0
          }

          run_stage 'Compile full Java source tree' bash -lc '
            rm -rf ROOT_build/direct-main-java17/classes
            mkdir -p ROOT_build/direct-main-java17/classes
            find src -name "*.java" -print | sort > ROOT_build/direct-main-java17/sources.txt
            test -s ROOT_build/direct-main-java17/sources.txt
            javac -encoding UTF-8 --release 17 \
              -d ROOT_build/direct-main-java17/classes \
              @ROOT_build/direct-main-java17/sources.txt
          '

          if [ -z "$failed" ]; then
            run_stage 'Focused semantic resolver smoke' java -Djava.awt.headless=true \
              -cp ROOT_build/direct-main-java17/classes \
              mechanist.Milestone02SemanticRenderAssetResolverSmoke
          fi
          if [ -z "$failed" ]; then
            run_stage 'Focused semantic runtime bridge smoke' java -Djava.awt.headless=true \
              -cp ROOT_build/direct-main-java17/classes \
              mechanist.Milestone02SemanticRuntimeIntentBridgeSmoke
          fi
          if [ -z "$failed" ]; then
            run_stage 'Semantic coverage smoke' java -Djava.awt.headless=true \
              -cp ROOT_build/direct-main-java17/classes \
              mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
          fi
          if [ -z "$failed" ]; then
            run_stage 'Gate 3 player-facing smoke suite' java -Djava.awt.headless=true \
              -cp ROOT_build/direct-main-java17/classes \
              mechanist.Gate3PlayerFacingTextSmokeSuite
          fi

          if [ -z "$failed" ]; then
            echo '=== Source-build Java classfile ceiling ===' | tee -a "$log"
            python - <<'PY' >>"$log" 2>&1
          from pathlib import Path
          import struct

          files = sorted(Path('ROOT_build/direct-main-java17/classes').rglob('*.class'))
          if not files:
              raise SystemExit('No source-build class files were produced.')
          highest = 0
          for path in files:
              with path.open('rb') as handle:
                  if handle.read(4) != b'\xca\xfe\xba\xbe':
                      raise SystemExit(f'Invalid classfile magic: {path}')
                  _minor, major = struct.unpack('>HH', handle.read(4))
                  highest = max(highest, major)
                  if major > 61:
                      raise SystemExit(f'Classfile exceeds Java 17: {path} major={major}')
          print(f'Java 17 source classfile gate passed: files={len(files)} highestMajor={highest}')
          PY
            code=$?
            if [ "$code" -ne 0 ]; then
              failed='Source-build Java classfile ceiling'
              failure_code="$code"
              echo "FAILED stage=$failed code=$code" | tee -a "$log"
            else
              echo 'PASSED stage=Source-build Java classfile ceiling' | tee -a "$log"
            fi
          fi

          if [ -z "$failed" ]; then
            run_stage 'Production package build' pwsh -NoProfile -Command \
              "./scripts/PACKAGE_CLIENT_WINDOWS.ps1 -OutputDir 'ROOT_build/direct-main-package-client' -CleanOutput -CleanClasses -BuildJar"
          fi

          if [ -z "$failed" ]; then
            run_stage 'Packaged jar verification' bash -lc '
              package_root="ROOT_build/direct-main-package-client"
              jar_path="$package_root/TheMechanist.jar"
              test -d "$package_root/classes"
              test -f "$package_root/classes/mechanist/TheMechanist.class"
              test -f "$jar_path"
              jar tf "$jar_path" | grep -Fx "mechanist/TheMechanist.class"
              unzip -p "$jar_path" META-INF/MANIFEST.MF | grep -F "Main-Class: mechanist.TheMechanist"
            '
          fi

          if [ -z "$failed" ]; then
            echo '=== Packaged Java classfile ceiling ===' | tee -a "$log"
            python - <<'PY' >>"$log" 2>&1
          from pathlib import Path
          import struct

          files = sorted(Path('ROOT_build/direct-main-package-client/classes').rglob('*.class'))
          if not files:
              raise SystemExit('The production package contained no class files.')
          highest = 0
          for path in files:
              with path.open('rb') as handle:
                  if handle.read(4) != b'\xca\xfe\xba\xbe':
                      raise SystemExit(f'Invalid packaged classfile magic: {path}')
                  _minor, major = struct.unpack('>HH', handle.read(4))
                  highest = max(highest, major)
                  if major > 61:
                      raise SystemExit(f'Packaged classfile exceeds Java 17: {path} major={major}')
          print(f'Java 17 package classfile gate passed: files={len(files)} highestMajor={highest}')
          PY
            code=$?
            if [ "$code" -ne 0 ]; then
              failed='Packaged Java classfile ceiling'
              failure_code="$code"
              echo "FAILED stage=$failed code=$code" | tee -a "$log"
            else
              echo 'PASSED stage=Packaged Java classfile ceiling' | tee -a "$log"
            fi
          fi

          if [ -z "$failed" ]; then
            echo '=== Packaged client eight-second boot ===' | tee -a "$log"
            if ! command -v xvfb-run >/dev/null 2>&1; then
              sudo apt-get update >>"$log" 2>&1
              sudo apt-get install -y xvfb >>"$log" 2>&1
            fi
            package_root="$PWD/ROOT_build/direct-main-package-client"
            stdout="$PWD/ROOT_build/direct-main-java17/boot.stdout.log"
            stderr="$PWD/ROOT_build/direct-main-java17/boot.stderr.log"
            timeout 8s xvfb-run -a java \
              -Djava.awt.headless=false \
              -Dmechanist.assetRoot="$package_root" \
              -Dmechanist.generatedAssetRoot="$package_root" \
              -Dmechanist.assetTier=low_32 \
              -Dmechanist.assetResolution=32 \
              -cp "$package_root/classes:$package_root" \
              mechanist.TheMechanist \
              >"$stdout" 2>"$stderr"
            code=$?
            if [ "$code" -eq 0 ] || [ "$code" -eq 124 ]; then
              echo "PASSED stage=Packaged client eight-second boot exit=$code" | tee -a "$log"
            else
              failed='Packaged client eight-second boot'
              failure_code="$code"
              echo "FAILED stage=$failed code=$code" | tee -a "$log"
              echo '--- stdout ---' >> "$log"
              cat "$stdout" >> "$log" 2>&1
              echo '--- stderr ---' >> "$log"
              cat "$stderr" >> "$log" 2>&1
            fi
          fi

          if [ -z "$failed" ]; then
            failed='none'
            failure_code=0
            result='success'
            echo 'DIRECT JAVA 17 MILESTONE VERIFICATION PASSED' | tee -a "$log"
          else
            result='failure'
          fi

          tail -n 220 "$log" > "$tail_file"
          echo "stage=$failed" >> "$GITHUB_OUTPUT"
          echo "code=$failure_code" >> "$GITHUB_OUTPUT"
          echo "result=$result" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish direct verification audit
        uses: actions/github-script@v7
        env:
          VERIFY_STAGE: ${{ steps.verify.outputs.stage }}
          VERIFY_CODE: ${{ steps.verify.outputs.code }}
          VERIFY_RESULT: ${{ steps.verify.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const tail = fs.readFileSync('ROOT_build/direct-main-java17/tail.log', 'utf8');
            const stage = process.env.VERIFY_STAGE || 'unknown';
            const code = process.env.VERIFY_CODE || 'unknown';
            const result = process.env.VERIFY_RESULT || 'failure';
            const passed = result === 'success';
            const body = [
              '## Direct Java 17 milestone verification',
              '',
              `Commit: \`${context.sha}\``,
              `Result: **${passed ? 'PASS' : 'FAIL'}**`,
              `First failing stage: **${stage}**`,
              `Exit code: \`${code}\``,
              '',
              '<details><summary>Verification log tail</summary>',
              '',
              '```text',
              tail.length > 50000 ? tail.slice(-50000) : tail,
              '```',
              '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 46,
              body
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'main-java17-milestone-gate',
              description: passed
                ? 'Java 17 compile, smokes, package, jar, and boot passed'
                : `Java 17 direct verification failed: ${stage}`
            });
