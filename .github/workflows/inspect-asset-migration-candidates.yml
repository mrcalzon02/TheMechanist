name: Inspect Asset Migration Candidates

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-asset-migration-candidates.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print candidate audit output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27512546224/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          output=$(find logs -type f -iname '*Print early migration candidates*.txt' | head -1)
          echo "OUTPUT=$output"
          grep -E 'Z (REGISTRY=|RESOLVED\||CANDIDATES_BEGIN\||CANDIDATE\||CANDIDATES_END\|)' "$output" | sed -E 's/^.*Z //'
