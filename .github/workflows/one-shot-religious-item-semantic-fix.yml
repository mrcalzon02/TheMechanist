name: One Shot Religious Item Semantic Fix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  repair-and-rerun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove generic icon false positive from religious item matching
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/mechanist/SemanticRenderAssetResolver.java')
          text = path.read_text(encoding='utf-8')
          old = 'case RELIGIOUS_OBJECT_ITEM_ICON -> itemIcon(asset) && themed(haystack, "religious", "relic", "icon", "prayer");'
          new = 'case RELIGIOUS_OBJECT_ITEM_ICON -> itemIcon(asset) && themed(haystack, "religious", "relic", "prayer", "holy object", "devotional");'
          if old not in text:
              raise SystemExit('expected religious object resolver line was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='')
          PY

      - name: Commit resolver repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/mechanist/SemanticRenderAssetResolver.java
          git commit -m 'Prevent generic icons matching religious objects'
          git push

      - name: Rerun verified character restoration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-character-paper-doll-restore-v2.yml/dispatches \
            -d '{"ref":"main"}'
