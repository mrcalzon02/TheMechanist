name: Main Java 17 Milestone Gate
# Verification trigger after the canonical room-shell transition API repair.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/PACKAGE_CLIENT_WINDOWS.ps1'
      - 'ROOT_docs/**'
      - '.github/workflows/main-java17-milestone-gate.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  issues: write

concurrency:
  group: main-java17-milestone-gate
  cancel-in-progress: true

jobs:
  compile-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile full Java source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ROOT_build/main-java17-gate
          mkdir -p ROOT_build/main-java17-gate/classes
          find src -name '*.java' -print | sort > ROOT_build/main-java17-gate/sources.txt
          test -s ROOT_build/main-java17-gate/sources.txt
          javac -encoding UTF-8 --release 17 \
            -d ROOT_build/main-java17-gate/classes \
            @ROOT_build/main-java17-gate/sources.txt

      - name: Run focused semantic resolver smoke
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/main-java17-gate/classes \
            mechanist.Milestone02SemanticRenderAssetResolverSmoke

      - name: Run focused semantic runtime bridge smoke
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/main-java17-gate/classes \
            mechanist.Milestone02SemanticRuntimeIntentBridgeSmoke

      - name: Run semantic coverage smoke
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/main-java17-gate/classes \
            mechanist.Milestone02SemanticAssetMigrationCoverageSmoke

      - name: Run Gate 3 player-facing smoke suite
        shell: bash
        run: |
          set -euo pipefail
          java -Djava.awt.headless=true \
            -cp ROOT_build/main-java17-gate/classes \
            mechanist.Gate3PlayerFacingTextSmokeSuite

      - name: Record source-build Java classfile ceiling
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import struct

          root = Path('ROOT_build/main-java17-gate/classes')
          files = sorted(root.rglob('*.class'))
          if not files:
              raise SystemExit('No class files were produced.')

          highest = 0
          for path in files:
              with path.open('rb') as handle:
                  magic = handle.read(4)
                  if magic != b'\xca\xfe\xba\xbe':
                      raise SystemExit(f'Invalid classfile magic: {path}')
                  minor, major = struct.unpack('>HH', handle.read(4))
                  highest = max(highest, major)
                  if major > 61:
                      raise SystemExit(f'Classfile exceeds Java 17: {path} major={major}')

          print(f'Java 17 source classfile gate passed: files={len(files)} highestMajor={highest}')
          PY

      - name: Build production client package and jar
        shell: pwsh
        run: |
          ./scripts/PACKAGE_CLIENT_WINDOWS.ps1 `
            -OutputDir 'ROOT_build/main-package-client' `
            -CleanOutput `
            -CleanClasses `
            -BuildJar

      - name: Verify packaged jar and Java 17 classfiles
        shell: bash
        run: |
          set -euo pipefail
          package_root='ROOT_build/main-package-client'
          jar_path="$package_root/TheMechanist.jar"
          test -d "$package_root/classes"
          test -f "$package_root/classes/mechanist/TheMechanist.class"
          test -f "$jar_path"
          jar tf "$jar_path" | grep -Fx 'mechanist/TheMechanist.class'
          unzip -p "$jar_path" META-INF/MANIFEST.MF | grep -F 'Main-Class: mechanist.TheMechanist'

          python - <<'PY'
          from pathlib import Path
          import struct

          root = Path('ROOT_build/main-package-client/classes')
          files = sorted(root.rglob('*.class'))
          if not files:
              raise SystemExit('The production package contained no class files.')

          highest = 0
          for path in files:
              with path.open('rb') as handle:
                  if handle.read(4) != b'\xca\xfe\xba\xbe':
                      raise SystemExit(f'Invalid packaged classfile magic: {path}')
                  minor, major = struct.unpack('>HH', handle.read(4))
                  highest = max(highest, major)
                  if major > 61:
                      raise SystemExit(f'Packaged classfile exceeds Java 17: {path} major={major}')

          print(f'Java 17 package classfile gate passed: files={len(files)} highestMajor={highest}')
          PY

      - name: Boot packaged client for eight seconds
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi

          package_root="$PWD/ROOT_build/main-package-client"
          stdout="$PWD/ROOT_build/main-package-client-boot.stdout.log"
          stderr="$PWD/ROOT_build/main-package-client-boot.stderr.log"
          set +e
          timeout 8s xvfb-run -a java \
            -Djava.awt.headless=false \
            -Dmechanist.assetRoot="$package_root" \
            -Dmechanist.generatedAssetRoot="$package_root" \
            -Dmechanist.assetTier=low_32 \
            -Dmechanist.assetResolution=32 \
            -cp "$package_root/classes:$package_root" \
            mechanist.TheMechanist \
            >"$stdout" 2>"$stderr"
          code=$?
          set -e

          if [ "$code" -eq 0 ]; then
            echo 'Package boot smoke passed: client exited cleanly before the timeout.'
          elif [ "$code" -eq 124 ]; then
            echo 'Package boot smoke passed: client remained alive for the eight-second window.'
          else
            echo "Package boot smoke failed with exit code $code."
            echo '--- stdout ---'
            cat "$stdout" || true
            echo '--- stderr ---'
            cat "$stderr" || true
            exit "$code"
          fi

  diagnose-first-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Record first failing Java 17 stage
        id: diagnose
        shell: bash
        run: |
          set +e
          mkdir -p ROOT_build/main-java17-diagnostic
          log='ROOT_build/main-java17-diagnostic/full.log'
          tail_file='ROOT_build/main-java17-diagnostic/tail.log'
          : > "$log"
          failed=''
          failure_code=0

          run_stage() {
            local label="$1"
            shift
            echo "=== $label ===" | tee -a "$log"
            "$@" >>"$log" 2>&1
            local code=$?
            if [ "$code" -ne 0 ]; then
              failed="$label"
              failure_code="$code"
              echo "FAILED stage=$label code=$code" | tee -a "$log"
              return 1
            fi
            echo "PASSED stage=$label" | tee -a "$log"
            return 0
          }

          run_stage 'Compile full Java source tree' bash -lc '
            rm -rf ROOT_build/main-java17-diagnostic/classes
            mkdir -p ROOT_build/main-java17-diagnostic/classes
            find src -name "*.java" -print | sort > ROOT_build/main-java17-diagnostic/sources.txt
            test -s ROOT_build/main-java17-diagnostic/sources.txt
            javac -encoding UTF-8 --release 17 \
              -d ROOT_build/main-java17-diagnostic/classes \
              @ROOT_build/main-java17-diagnostic/sources.txt
          '

          if [ -z "$failed" ]; then
            run_stage 'Focused semantic resolver smoke' java -Djava.awt.headless=true \
              -cp ROOT_build/main-java17-diagnostic/classes \
              mechanist.Milestone02SemanticRenderAssetResolverSmoke
          fi
          if [ -z "$failed" ]; then
            run_stage 'Focused semantic runtime bridge smoke' java -Djava.awt.headless=true \
              -cp ROOT_build/main-java17-diagnostic/classes \
              mechanist.Milestone02SemanticRuntimeIntentBridgeSmoke
          fi
          if [ -z "$failed" ]; then
            run_stage 'Semantic coverage smoke' java -Djava.awt.headless=true \
              -cp ROOT_build/main-java17-diagnostic/classes \
              mechanist.Milestone02SemanticAssetMigrationCoverageSmoke
          fi
          if [ -z "$failed" ]; then
            run_stage 'Gate 3 player-facing smoke suite' java -Djava.awt.headless=true \
              -cp ROOT_build/main-java17-diagnostic/classes \
              mechanist.Gate3PlayerFacingTextSmokeSuite
          fi
          if [ -z "$failed" ]; then
            run_stage 'Production package build' pwsh -NoProfile -Command \
              "./scripts/PACKAGE_CLIENT_WINDOWS.ps1 -OutputDir 'ROOT_build/main-package-client-diagnostic' -CleanOutput -CleanClasses -BuildJar"
          fi
          if [ -z "$failed" ]; then
            run_stage 'Packaged jar verification' bash -lc '
              package_root="ROOT_build/main-package-client-diagnostic"
              jar_path="$package_root/TheMechanist.jar"
              test -d "$package_root/classes"
              test -f "$package_root/classes/mechanist/TheMechanist.class"
              test -f "$jar_path"
              jar tf "$jar_path" | grep -Fx "mechanist/TheMechanist.class"
              unzip -p "$jar_path" META-INF/MANIFEST.MF | grep -F "Main-Class: mechanist.TheMechanist"
            '
          fi

          if [ -z "$failed" ]; then
            failed='none through packaged jar verification'
            failure_code=0
            echo 'All diagnosed stages passed; the remaining authoritative stage is packaged-client boot.' | tee -a "$log"
          fi

          tail -n 180 "$log" > "$tail_file"
          echo "stage=$failed" >> "$GITHUB_OUTPUT"
          echo "code=$failure_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post diagnostic result to issue 46
        uses: actions/github-script@v7
        env:
          DIAGNOSTIC_STAGE: ${{ steps.diagnose.outputs.stage }}
          DIAGNOSTIC_CODE: ${{ steps.diagnose.outputs.code }}
        with:
          script: |
            const fs = require('fs');
            const tail = fs.readFileSync('ROOT_build/main-java17-diagnostic/tail.log', 'utf8');
            const stage = process.env.DIAGNOSTIC_STAGE || 'unknown';
            const code = process.env.DIAGNOSTIC_CODE || 'unknown';
            const clipped = tail.length > 50000 ? tail.slice(-50000) : tail;
            const body = [
              '## Temporary Java 17 milestone-gate diagnostic',
              '',
              `Commit: \`${context.sha}\``,
              `First failing stage: **${stage}**`,
              `Exit code: \`${code}\``,
              '',
              '<details><summary>Final diagnostic log</summary>',
              '',
              '```text',
              clipped,
              '```',
              '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 46,
              body
            });

  publish-status:
    if: always()
    needs: compile-and-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Publish connector-visible commit status
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.compile-and-smoke.result }}';
            const passed = result === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'main-java17-milestone-gate',
              description: passed
                ? 'Java 17 compile, smokes, package, jar, and boot passed'
                : `Java 17 milestone gate ${result}`
            });
