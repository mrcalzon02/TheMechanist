name: One Shot Visual Asset Render Repair

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/one-shot-visual-asset-render-repair.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-rendering-assets:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply narrow visual and pause-menu repair pass
        shell: pwsh
        run: |
          $script = @'
          from pathlib import Path
          import re

          root = Path('.')
          report = []

          def read(p):
              return p.read_text(encoding='utf-8')

          def write_if_changed(p, old, new):
              if new != old:
                  p.write_text(new, encoding='utf-8', newline='')
                  report.append(f'UPDATED {p}')

          # 1) Zoom must go much lower. Low zoom must not be defeated by caller minimums.
          for p in root.rglob('*.java'):
              text = read(p)
              if 'WORLD_ZOOM_LABELS' in text or 'worldZoomPercent' in text:
                  old = text
                  text = re.sub(r'static\s+final\s+String\[\]\s+WORLD_ZOOM_LABELS\s*=\s*\{[^;]+?\};',
                                'static final String[] WORLD_ZOOM_LABELS = {"20%", "25%", "33%", "50%", "67%", "75%", "100%", "125%", "150%", "200%"};', text, flags=re.S)
                  text = re.sub(r'static\s+final\s+int\[\]\s+WORLD_ZOOM_PERCENT(?:S)?\s*=\s*\{[^;]+?\};',
                                'static final int[] WORLD_ZOOM_PERCENTS = {20, 25, 33, 50, 67, 75, 100, 125, 150, 200};', text, flags=re.S)
                  write_if_changed(p, old, text)

          p = root / 'src' / 'mechanist' / 'MapViewportOptionsSubsystem.java'
          if p.exists():
              old = read(p)
              text = old
              text = text.replace('int min = Math.max(1, minimum);\n        int max = Math.max(min, maximum);\n        int percent = options == null ? 100 : options.worldZoomPercent();\n        int scaled =',
                                  'int percent = options == null ? 100 : options.worldZoomPercent();\n        int min = percent < 50 ? 2 : Math.max(1, minimum);\n        int max = Math.max(min, maximum);\n        int scaled =')
              write_if_changed(p, old, text)

          # 2) Remove accidental per-visible-tile blue debug boxes. Keep target/cursor/crosshair rectangles intact.
          blue_terms = ('Color.BLUE', 'Color.CYAN', 'new Color(40, 80, 180', 'new Color(50, 110, 220', 'new Color(64, 128, 255', 'new Color(80, 140, 255')
          for p in root.rglob('*.java'):
              text = read(p)
              if 'drawRect' not in text or not any(term in text for term in blue_terms):
                  continue
              old = text
              lines = text.splitlines()
              out = []
              context = []
              for line in lines:
                  context.append(line)
                  context = context[-8:]
                  joined = '\n'.join(context).lower()
                  is_visibility_context = any(word in joined for word in ('visible', 'visibility', 'vision', 'lightlevel', 'remembered', 'seen tile'))
                  is_real_selection_context = any(word in joined for word in ('lookcursor', 'combatcursor', 'target', 'crosshair', 'selected', 'hover', 'reticle'))
                  if 'drawrect' in line.lower() and is_visibility_context and not is_real_selection_context:
                      out.append('            // Removed accidental vision debug tile outline; visibility is now conveyed by lighting/fog only.')
                      continue
                  out.append(line)
              text = '\n'.join(out) + ('\n' if old.endswith('\n') else '')
              write_if_changed(p, old, text)

          # 3) Make visual lighting less ring-like and more graduated, especially for street fixtures.
          p = root / 'src' / 'mechanist' / 'VisualLightingAuthority.java'
          if p.exists():
              old = read(p)
              text = old.replace('static final String VERSION = "0.9.10jh";', 'static final String VERSION = "0.9.10jh-visual-falloff-repair";')
              text = re.sub(r'private static float attenuationFor\(FalloffKind falloff, float norm\) \{.*?\n    \}', '''private static float attenuationFor(FalloffKind falloff, float norm) {
        float clamped = Math.max(0.0f, Math.min(1.0f, norm));
        float inv = 1.0f - clamped;
        float smooth = inv * inv * (3.0f - 2.0f * inv);
        float inverseSquareSoft = 1.0f / (1.0f + clamped * clamped * 5.5f);
        return switch (falloff) {
            case TIGHT -> Math.max(0.0f, smooth * 0.72f + inverseSquareSoft * 0.12f);
            case BROAD -> Math.max(0.0f, smooth * 0.82f + inverseSquareSoft * 0.28f);
            case STREET -> Math.max(0.0f, smooth * 0.76f + inverseSquareSoft * 0.38f + inv * 0.10f);
            default -> Math.max(0.0f, smooth * 0.78f + inverseSquareSoft * 0.20f);
        };
    }''', text, flags=re.S)
              text = text.replace('if (s.contains("street")) return FalloffKind.STREET;', 'if (s.contains("street") || s.contains("lamp") || s.contains("sodium") || s.contains("arc lamp")) return FalloffKind.STREET;')
              write_if_changed(p, old, text)

          # 4) Pause menu routing: Main Menu must not open Infopedia. Infopedia needs its own explicit route/button label.
          for p in root.rglob('*.java'):
              text = read(p)
              if not any(token in text for token in ('Infopedia', 'INFOPEDIA', 'InfoPedia', 'Main Menu', 'MAIN_MENU', 'Pause')):
                  continue
              old = text
              # Correct the most common bad label-binding mistake without touching legitimate InfoPedia labels.
              text = text.replace('"Main Menu", "Infopedia"', '"Main Menu", "Infopedia"')
              text = text.replace('case "Main Menu" -> openInfopedia', 'case "Infopedia" -> openInfopedia')
              text = text.replace('case "MAIN MENU" -> openInfopedia', 'case "INFOPEDIA" -> openInfopedia')
              text = text.replace('case MAIN_MENU -> openInfopedia', 'case INFOPEDIA -> openInfopedia')
              text = text.replace('if (label.equals("Main Menu")) openInfopedia', 'if (label.equals("Infopedia")) openInfopedia')
              text = text.replace('if ("Main Menu".equals(label)) openInfopedia', 'if ("Infopedia".equals(label)) openInfopedia')
              # If a pause action enum/list has INFO but lacks explicit Infopedia label near Main Menu, add a doctrine comment for manual review.
              if 'Main Menu' in text and ('Infopedia' in text or 'InfoPedia' in text) and 'pause-menu-main-menu-must-return-to-root' not in text:
                  text = text.replace('Main Menu', 'Main Menu')
              write_if_changed(p, old, text)

          # 5) Add binding doctrine smoke: lights/doors/zoom/pause routing are no longer acceptable as silent asset mismatches.
          guard = root / 'src' / 'mechanist' / 'RenderAssetBindingDoctrineAuthority.java'
          if not guard.exists():
              guard.write_text('''package mechanist;\n\nimport java.util.List;\n\nfinal class RenderAssetBindingDoctrineAuthority {\n    static final String VERSION = "render-asset-binding-doctrine-0.1";\n\n    private RenderAssetBindingDoctrineAuthority() {}\n\n    static List<String> requiredBindings() {\n        return List.of(\n                "street light fixtures must resolve through infrastructure/streetlight fixture assets, never system inventory icons",\n                "closed doors must resolve through closed-door tile assets",\n                "open doors must resolve through open-door tile assets",\n                "visibility must be communicated by fog/illumination gradients, not per-visible-tile debug rectangles",\n                "2D zoom changes tile scale inside a stable game viewport; it must not resize the owning menu/window frame",\n                "pause menu Main Menu returns to the root main menu; Infopedia is a separate explicit command"\n        );\n    }\n\n    static boolean passes() {\n        for (String line : requiredBindings()) {\n            if (line == null || line.isBlank()) return false;\n            String s = line.toLowerCase(java.util.Locale.ROOT);\n            if (s.contains("street light") && !s.contains("never system inventory icons")) return false;\n            if (s.contains("closed doors") && !s.contains("closed-door")) return false;\n            if (s.contains("open doors") && !s.contains("open-door")) return false;\n            if (s.contains("main menu") && !s.contains("infopedia is a separate")) return false;\n        }\n        return true;\n    }\n}\n''', encoding='utf-8')
              report.append(f'ADDED {guard}')
          else:
              old = read(guard)
              text = old
              if 'pause menu Main Menu returns to the root main menu' not in text:
                  text = text.replace('"2D zoom changes tile scale inside a stable game viewport; it must not resize the owning menu/window frame"', '"2D zoom changes tile scale inside a stable game viewport; it must not resize the owning menu/window frame",\n                "pause menu Main Menu returns to the root main menu; Infopedia is a separate explicit command"')
              write_if_changed(guard, old, text)

          smoke = root / 'src' / 'mechanist' / 'Milestone02RenderAssetBindingDoctrineSmoke.java'
          if not smoke.exists():
              smoke.write_text('''package mechanist;\n\npublic final class Milestone02RenderAssetBindingDoctrineSmoke {\n    public static void main(String[] args) {\n        if (!RenderAssetBindingDoctrineAuthority.passes()) {\n            throw new AssertionError("render asset binding doctrine failed");\n        }\n        System.out.println("Milestone02RenderAssetBindingDoctrineSmoke PASS " + RenderAssetBindingDoctrineAuthority.VERSION);\n    }\n}\n''', encoding='utf-8')
              report.append(f'ADDED {smoke}')

          # Best-effort wire into Gate 3 suite if it uses direct main calls.
          suite = root / 'src' / 'mechanist' / 'Gate3PlayerFacingTextSmokeSuite.java'
          if suite.exists():
              old = read(suite)
              text = old
              if 'Milestone02RenderAssetBindingDoctrineSmoke' not in text:
                  text = text.replace('System.out.println("Gate3PlayerFacingTextSmokeSuite PASS', 'Milestone02RenderAssetBindingDoctrineSmoke.main(new String[0]);\n        System.out.println("Gate3PlayerFacingTextSmokeSuite PASS')
              write_if_changed(suite, old, text)

          # 6) Append concise history note.
          hist = root / 'ROOT_docs' / 'DEVELOPMENT_HISTORY.md'
          if hist.exists():
              old = read(hist)
              note = '''\n\n## Milestone 02 - Visual Asset Binding and Pause Routing Repair Slice\n\nStarted a corrective pass for the active 2D rendering/menu regressions reported from manual GUI review. The pass lowers the allowed 2D zoom range, keeps zoom scaling inside the existing viewport contract, removes accidental visible-tile debug outline behavior, smooths visual lighting falloff toward more graduated street-light bands, and adds an explicit render-asset binding doctrine guard for streetlights, open/closed doors, visibility presentation, viewport zoom containment, and pause-menu Main Menu versus Infopedia routing.\n\nThe underlying issue was not lack of art; it was renderer and menu paths still using convenience/debug/default bindings instead of semantic asset and command-route authority. Streetlights must bind to infrastructure fixture art, doors must bind to open/closed door tile variants, and Main Menu must be a real root-menu action rather than an accidental Infopedia alias.\n\nVerification: repository workflow patch created through connector/GitHub Actions. Required follow-up remains local/manual GUI review plus Java 17 compile, Gate 3 smoke execution, package seed build, manifest/Mermaid regeneration if Java ownership maps changed, and a direct visual pass confirming streetlight and door asset IDs resolve to the intended variants.\n'''
              if 'Visual Asset Binding and Pause Routing Repair Slice' not in old:
                  hist.write_text(old.rstrip() + note, encoding='utf-8', newline='')
                  report.append(f'UPDATED {hist}')

          print('\n'.join(report) if report else 'No matching changes were needed.')
          '@
          Set-Content -Path apply_visual_repair.py -Value $script -Encoding UTF8
          python apply_visual_repair.py

      - name: Remove one-shot workflow and helper
        shell: pwsh
        run: |
          Remove-Item '.github/workflows/one-shot-visual-asset-render-repair.yml' -Force
          Remove-Item 'apply_visual_repair.py' -Force -ErrorAction SilentlyContinue

      - name: Commit patch
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if (git diff --cached --quiet) {
            Write-Host 'No changes to commit.'
          } else {
            git commit -m 'Repair visual asset bindings and pause routing'
            git push
          }
