name: Monitor Character Paper Doll Restoration

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dispatch-character-paper-doll-restore.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for verified restoration workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for attempt in $(seq 1 60); do
            json=$(curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/one-shot-character-paper-doll-restore.yml/runs?event=workflow_dispatch&per_page=1")
            id=$(echo "$json" | jq -r '.workflow_runs[0].id // empty')
            status=$(echo "$json" | jq -r '.workflow_runs[0].status // empty')
            conclusion=$(echo "$json" | jq -r '.workflow_runs[0].conclusion // empty')
            echo "run=$id status=$status conclusion=$conclusion"
            if [ "$status" = "completed" ]; then
              test "$conclusion" = "success"
              exit
            fi
            sleep 10
          done
          exit 1
