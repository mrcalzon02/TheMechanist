name: Inspect Character Equipment And Medical Tabs

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-character-equipment-medical-tabs.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print implementation compile errors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27510731596/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          grep -RniE "error:|Exception|AssertionError|PASS|FAILED|failed" logs | tail -240 || true
