name: Inspect Character Paper Doll Fixed Run

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/inspect-character-paper-doll-fixed-run.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print restoration smoke failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          curl --fail-with-body -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/27509590058/logs" \
            -o logs.zip
          mkdir logs
          unzip -q logs.zip -d logs
          grep -RniE "AssertionError|Exception|error:|FAILED|failed|PASS" logs | tail -220 || true
