name: Limited Alpha Playtest Report
description: Report a verified limited-alpha defect with exact candidate identity and reproduction steps.
title: "[Alpha] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Use the launcher Diagnostics button first. Do not post private tokens, unrelated personal files, or unapproved saves. Remote authoritative multiplayer is not yet an open capability; distinguish relay transport defects from gameplay-session requests.

  - type: input
    id: version
    attributes:
      label: Candidate version
      description: Copy the version from the generated diagnostic report.
      placeholder: 0.9.10iz
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Source commit
      description: Copy the exact commit from the generated diagnostic report.
      placeholder: 40-character commit SHA
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform package
      options:
        - windows-x64 portable
        - windows-x64 native app image
        - windows-x64 EXE/MSI
        - linux-x64 portable
        - linux-x64 native app image
        - linux-x64 DEB/RPM
        - other / unsupported
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker — install, launch, save, load, exit, or data-loss failure
        - major — crash, corruption, exposure, or major gameplay path failure
        - moderate — incorrect recoverable behavior or significant workaround
        - minor — limited functional defect
        - cosmetic — presentation only
    validations:
      required: true

  - type: dropdown
    id: modified
    attributes:
      label: Modified content detected
      options:
        - "No"
        - "Yes"
        - Unknown / launcher unavailable
    validations:
      required: true

  - type: textarea
    id: action
    attributes:
      label: What were you trying to do?
      description: Include the game screen, world/save context, and last successful action.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Verify packages
        2. Launch the candidate
        3. Load slot ...
        4. Perform ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: dropdown
    id: restart
    attributes:
      label: Reproduces after a clean restart
      options:
        - "Yes"
        - "No"
        - Not tested
    validations:
      required: true

  - type: dropdown
    id: new_save
    attributes:
      label: Reproduces in a new save/world
      options:
        - "Yes"
        - "No"
        - Not applicable
        - Not tested
    validations:
      required: true

  - type: textarea
    id: host_scope
    attributes:
      label: Host or networking scope
      description: For host defects, provide requested/actual bind address, port, relay/session behavior, close, and restart results. State whether this is transport-only evidence.

  - type: textarea
    id: attachments
    attributes:
      label: Diagnostic report and approved attachments
      description: Attach or paste the launcher diagnostic report. Add saves only when requested through the approved private test channel.
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and distribution check
      options:
        - label: I reviewed the report and attachments for tokens, personal data, private server details, and unrelated files.
          required: true
        - label: I will not redistribute this candidate or its private test material outside the approved playtest group.
          required: true
